<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ponto Minimal Symm</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --bg: #ffffff; 
            --card-ponto: #ffe5d9; 
            --card-toggle: #e2ece9; 
            --card-stats: #f0eff4; 
            --btn-foto: #d8e2dc; 
            --btn-submit: #94d2bd; 
            --accent: #ff9b85; 
            --blue: #a2d2ff; 
            --orange: #ffd8a8;
            --text: #4a4a4a;
        }
        
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            margin: 0; padding: 15px; 
            color: var(--text); 
            -webkit-tap-highlight-color: transparent; 
        }
        
        header { margin-bottom: 25px; text-align: center; }
        header i { font-size: 38px; color: #ddd; }
        #sync-status { display: block; font-size: 8px; font-weight: bold; color: #ccc; margin-top: 5px; text-transform: uppercase; }

        .grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }

        .btn-card { 
            border-radius: 20px; height: 100px;
            position: relative; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
        }
        .btn-card.time { background: var(--card-ponto); }
        .btn-card.toggle { background: var(--card-toggle); cursor: pointer; }
        
        .btn-card i { font-size: 18px; color: #8d7b73; margin-bottom: 5px; opacity: 0.6; }
        .toggle i { color: #6ab09c; opacity: 1; }

        .time-input { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: none; background: transparent; font-size: 26px; font-weight: bold; 
            color: #6d5952; text-align: center; font-family: inherit;
            padding-top: 35px; box-sizing: border-box; outline: none; z-index: 2;
        }
        .hidden-check { display: none; }
        .btn-card.toggle.inactive { opacity: 0.4; filter: grayscale(1); }

        .area-select { grid-column: span 2; }
        select { 
            padding: 12px; border-radius: 12px; border: none; 
            background: var(--card-toggle); font-weight: bold; 
            width: 100%; outline: none; text-align: center; color: var(--text);
        }

        .btn-foto { 
            width: 100%; background: var(--btn-foto); color: #666; border: none; 
            padding: 20px; border-radius: 20px; font-size: 20px; margin-bottom: 15px;
        }
        
        #preview-foto { width: 100%; border-radius: 20px; display: none; margin-bottom: 15px; object-fit: cover; }

        .btn-submit { 
            width: 100%; background: var(--btn-submit); color: #466b5e; border: none; 
            padding: 25px; border-radius: 20px; font-size: 22px;
        }

        .stats-container { background: var(--card-stats); border-radius:20px; padding:20px; margin-top:25px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px; font-weight: 800; color: #bbb; text-transform: uppercase; }
        .bar-bg { background: #fff; height: 12px; border-radius: 6px; overflow: hidden; margin-bottom: 15px; }
        .bar-fill { height: 100%; width: 0%; transition: width 1s ease-out; }
        
        .fill-base { background: var(--blue); }
        .fill-15 { background: var(--accent); }
        .fill-dinner { background: var(--orange); }
    </style>
</head>
<body>

<div style="max-width:400px; margin:0 auto;">
    <header>
        <i class="fa-solid fa-business-time"></i>
        <span id="sync-status">---</span>
    </header>

    <div class="grid-2x2">
        <div class="btn-card time">
            <i class="fa-solid fa-right-to-bracket"></i>
            <input type="time" id="input-entrada" class="time-input" onchange="manualSave('ent')">
        </div>
        <div class="btn-card time">
            <i class="fa-solid fa-right-from-bracket"></i>
            <input type="time" id="input-saida" class="time-input" onchange="manualSave('sai')">
        </div>
    </div>

    <div class="grid-2x2">
        <div class="btn-card toggle" id="card-pausa" onclick="toggleBtn('check-pausa', 'card-pausa')">
            <i class="fa-solid fa-circle-pause"></i>
            <input type="checkbox" id="check-pausa" class="hidden-check" checked onchange="calc()">
        </div>
        <div class="btn-card toggle" id="card-almoco" onclick="toggleBtn('check-almoco', 'card-almoco')">
            <i class="fa-solid fa-utensils"></i>
            <input type="checkbox" id="check-almoco" class="hidden-check" onchange="toggleAlmocoUI()">
        </div>
        
        <div class="area-select" id="area-almoco" style="display:none;">
            <select id="select-almoco" onchange="calc()">
                <option value="1">1h00m</option>
                <option value="1.5">1h30m</option>
            </select>
        </div>
    </div>

    <div>
        <button class="btn-foto" onclick="document.getElementById('file-input').click()">
            <i class="fa-solid fa-image"></i>
        </button>
        <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="processarFoto(this)">
    </div>
    
    <img id="preview-foto">

    <button class="btn-submit" id="main-btn" onclick="enviar()">
        <i class="fa-solid fa-cloud-arrow-up"></i>
    </button>

    <div class="stats-container">
        <div class="progress-label"><span>BASE</span><span id="txt-base">0h00m</span></div>
        <div class="bar-bg"><div id="bar-base" class="bar-fill fill-base"></div></div>
        
        <div class="progress-label"><span>+15</span><span id="txt-15">0h00m</span></div>
        <div class="bar-bg"><div id="bar-15" class="bar-fill fill-15"></div></div>

        <div class="progress-label"><span>DINNER</span><span id="txt-dinner">0</span></div>
        <div class="bar-bg"><div id="bar-dinner" class="bar-fill fill-dinner"></div></div>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbxp4vOA-1Urs1noSVd53zxQzKG2gQLajD-EnVnhWraG7U-2qrkhBpL3yPmSAa9RLsMd/exec"; // LINHA 123
    let acumuladoMes = 0;
    let totalAlmocos = 0;
    let fotoBase64 = "";

    async function carregar() {
        document.getElementById('input-entrada').value = localStorage.getItem('p_ent') || "";
        document.getElementById('input-saida').value = localStorage.getItem('p_sai') || "";
        updateToggleVisual('check-pausa', 'card-pausa');
        updateToggleVisual('check-almoco', 'card-almoco');
        
        try {
            const res = await fetch(scriptURL);
            const data = await res.json();
            acumuladoMes = parseFloat(data.acumulado || 0);
            totalAlmocos = parseInt(data.almocos || 0);
            document.getElementById('sync-status').innerText = "SINCRO OK";
            calc();
        } catch(e) { document.getElementById('sync-status').innerText = "OFFLINE"; calc(); }
    }

    function formatTime(decimal) {
        let hrs = Math.floor(decimal);
        let mins = Math.round((decimal - hrs) * 60);
        return hrs + "h" + (mins < 10 ? "0" : "") + mins + "m";
    }

    function toggleBtn(checkId, cardId) {
        const cb = document.getElementById(checkId);
        cb.checked = !cb.checked;
        updateToggleVisual(checkId, cardId);
        if(checkId === 'check-almoco') toggleAlmocoUI();
        calc();
    }

    function updateToggleVisual(checkId, cardId) {
        const cb = document.getElementById(checkId);
        const card = document.getElementById(cardId);
        cb.checked ? card.classList.remove('inactive') : card.classList.add('inactive');
    }

    function toggleAlmocoUI() {
        document.getElementById('area-almoco').style.display = document.getElementById('check-almoco').checked ? "block" : "none";
        calc();
    }

    function processarFoto(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                fotoBase64 = canvas.toDataURL('image/jpeg', 0.7);
                document.getElementById('preview-foto').src = fotoBase64;
                document.getElementById('preview-foto').style.display = "block";
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function manualSave(tipo) {
        localStorage.setItem('p_' + tipo, document.getElementById('input-' + tipo).value);
        calc();
    }

    function toCent(ts) {
        if(!ts) return 0;
        let [h, m] = ts.split(':').map(Number);
        return h + (m/60);
    }

    function calc() {
        let ent = toCent(document.getElementById('input-entrada').value);
        let sai = toCent(document.getElementById('input-saida').value);
        
        let descPausa = document.getElementById('check-pausa').checked ? 0.5 : 0;
        let descAlmoco = document.getElementById('check-almoco').checked ? parseFloat(document.getElementById('select-almoco').value) : 0;
        let totalDescontos = descPausa + descAlmoco;

        if (sai < ent && sai !== 0) sai += 24; 

        let hoje = (sai > ent) ? (sai - ent - totalDescontos) : 0;
        if (hoje < 0) hoje = 0; 

        let totalGeral = acumuladoMes + hoje;

        let baseVal = Math.min(totalGeral, 174);
        document.getElementById('bar-base').style.width = (baseVal/174)*100 + "%";
        document.getElementById('txt-base').innerText = formatTime(baseVal);

        let extraVal = totalGeral > 174 ? Math.min(15, totalGeral - 174) : 0;
        document.getElementById('bar-15').style.width = (extraVal/15)*100 + "%";
        document.getElementById('txt-15').innerText = formatTime(extraVal);

        let isTodayAlmoco = document.getElementById('check-almoco').checked ? 1 : 0;
        document.getElementById('txt-dinner').innerText = totalAlmocos + isTodayAlmoco;
        document.getElementById('bar-dinner').style.width = Math.min(100, ((totalAlmocos + isTodayAlmoco)/22)*100) + "%";
    }

    async function enviar() {
        const btn = document.getElementById('main-btn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; 
        btn.disabled = true;
        
        let desc = (document.getElementById('check-pausa').checked ? 0.5 : 0) + 
                   (document.getElementById('check-almoco').checked ? parseFloat(document.getElementById('select-almoco').value) : 0);

        const payload = {
            data: new Date().toISOString().split('T')[0],
            entrada: toCent(document.getElementById('input-entrada').value),
            saida: toCent(document.getElementById('input-saida').value),
            almocoDuracao: desc,
            subAlmoco: document.getElementById('check-almoco').checked ? 16 : 0,
            foto: fotoBase64
        };

        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            localStorage.removeItem('p_ent'); localStorage.removeItem('p_sai');
            alert("✓"); location.reload();
        } catch (e) { alert("✗"); btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i>'; }
    }
    window.onload = carregar;
</script>
</body>
</html>
