<!DOCTYPE html>
<html lang="fr-CH">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pointage Müller</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Giga:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --bg: #ffffff; --header-bg: #212121; --header-text: #fafafa; 
            --card-ponto: #f5f5f5; --card-toggle: #e0e0e0; --card-stats: #eeeeee; 
            --btn-foto: #bdbdbd; --btn-submit: #9e9e9e; --text: #212121; 
            --text-secondary: #757575; --icon-active: #424242; --bar-bg: #e0e0e0;
            --color-pending: #d32f2f; --color-done: #388e3c; 
            --gap-main: 15px; 
            --color-repas: #fff59d; 
            --color-vacances: #bbdefb;
        }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; color: var(--text); -webkit-tap-highlight-color: transparent; }
        header { background: var(--header-bg); color: var(--header-text); padding: 40px 15px; margin-bottom: var(--gap-main); text-align: center; border-radius: 0 0 20px 20px; width: 100%; box-sizing: border-box; }
        .header-title { font-family: 'Lexend Giga', sans-serif; font-weight: 800; font-size: 24px; letter-spacing: -1.5px; text-transform: uppercase; line-height: 1; }
        #sync-status { display: block; font-size: 10px; font-weight: 900; margin-top: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); }

        .main-container { max-width: 400px; margin: 0 auto; padding: 0 15px; box-sizing: border-box; padding-bottom: 60px; }
        .grid-2x2, .grid-action { display: grid; gap: 15px; margin-bottom: var(--gap-main); }
        .grid-2x2 { grid-template-columns: 1fr 1fr; }
        .grid-action { grid-template-columns: 1fr 4fr; align-items: stretch; }
        .grid-20-80 { display: grid; grid-template-columns: 1fr 4fr; gap: 15px; margin-bottom: var(--gap-main); }

        /* Estilo para acomodar o seletor de horas ao lado do Congé */
        .conge-container { display: grid; grid-template-columns: 2fr 1fr; gap: 8px; }
        .select-hours { height: 35px; border-radius: 12px; border: none; background: var(--card-ponto); font-weight: 800; color: var(--text-secondary); text-align: center; appearance: none; }

        .btn-card { border-radius: 20px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; position: relative; transition: all 0.2s ease; }
        .btn-card.time { background: var(--card-ponto); padding: 10px; box-sizing: border-box; }
        .time-input { border: none; background: transparent; font-size: 16px; font-weight: 800; color: var(--text); width: 100%; text-align: center; }

        .btn-card.toggle { background: var(--card-toggle); cursor: pointer; }
        .btn-card i { font-size: 24px; color: var(--text-secondary); opacity: 0.7; }
        .toggle.active i { color: var(--icon-active); opacity: 1; }
        .toggle.active.btn-small { background: var(--icon-active); color: white; }
        .toggle.inactive { opacity: 0.4; filter: grayscale(1); }

        .meal-content { width: 100%; height: 100%; display: flex; flex-direction: column; }
        .meal-top { height: 65%; display: flex; align-items: center; justify-content: center; }
        .meal-bottom { height: 35%; display: flex; border-top: 1px solid rgba(0,0,0,0.05); background: rgba(0,0,0,0.03); }
        .meal-opt { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: var(--text-secondary); }
        .meal-opt.active { background: var(--icon-active); color: white; }

        .btn-small { height: 35px; border-radius: 12px; background: var(--card-ponto); border: none; color: var(--text-secondary); font-weight: bold; font-size: 11px; text-transform: uppercase; cursor: pointer; }
        .btn-foto { width: 100%; background: var(--btn-foto); color: #fafafa; border: none; border-radius: 20px; font-size: 20px; }
        .btn-submit { width: 100%; background: var(--btn-submit); color: #fafafa; border: none; padding: 25px; border-radius: 20px; font-size: 22px; cursor: pointer; }
        
        .stats-container { background: var(--card-stats); border-radius: 20px; padding: 20px; margin-bottom: var(--gap-main); }
        .month-label { font-size: 10px; font-weight: 900; color: var(--text-secondary); text-align: center; margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; }
        .progress-label { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px; font-weight: 800; color: #9e9e9e; text-transform: uppercase; }
        .bar-bg { background: var(--bar-bg); height: 12px; border-radius: 6px; overflow: hidden; margin-bottom: 15px; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.5s ease; }

        .history-title { font-family: 'Lexend Giga', sans-serif; font-size: 14px; margin-bottom: 15px; display: block; width: 100%; background: var(--header-bg); color: #ffffff; padding: 12px 0; border-radius: 20px; text-align: center; }
        .select-mes { width: 100%; height: 35px; border-radius: 12px; border: none; background: var(--card-ponto); font-weight: bold; color: var(--text-secondary); font-size: 11px; margin-bottom: 15px; text-align-last: center; }
        .history-item { display: grid; grid-template-columns: 2fr 1fr 1fr; background: var(--card-ponto); padding: 12px 15px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-bottom: 8px; }

        footer { text-align: center; padding: 20px; opacity: 0.3; }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <span class="header-title">POINTAGE MÜLLER</span>
            <span id="sync-status">AUTHENTIFICATION...</span>
        </header>

        <div class="grid-2x2">
            <div class="btn-card time"><i class="fa-solid fa-right-to-bracket"></i><input type="time" id="input-entrada" class="time-input"></div>
            <div class="btn-card time"><i class="fa-solid fa-right-from-bracket"></i><input type="time" id="input-saida" class="time-input"></div>
        </div>

        <div class="grid-20-80">
            <div class="btn-card toggle active" id="card-pausa" onclick="toggleSimple('check-pausa', 'card-pausa')"><i class="fa-solid fa-circle-pause"></i><input type="checkbox" id="check-pausa" style="display:none" checked onchange="calc()"></div>
            <div class="btn-card toggle inactive" id="card-almoco">
                <div class="meal-content">
                    <div class="meal-top" onclick="toggleMeal()"><i class="fa-solid fa-utensils"></i><input type="checkbox" id="check-almoco" style="display:none" onchange="calc()"></div>
                    <div class="meal-bottom"><div class="meal-opt" id="opt-1" onclick="setMealTime(1)">1H</div><div class="meal-opt active" id="opt-15" onclick="setMealTime(1.5)">1H30</div></div>
                </div>
            </div>
        </div>

        <div class="grid-2x2">
            <div class="conge-container">
                <button id="btn-main-conge" class="btn-small" style="width:100%" onclick="toggleTipo('CONGE', 'btn-main-conge')">congé</button>
                <select id="hours-main-conge" class="select-hours">
                    <option value="1">1h</option><option value="2">2h</option><option value="3">3h</option><option value="4">4h</option>
                    <option value="5">5h</option><option value="6">6h</option><option value="7">7h</option><option value="8" selected>8h</option>
                </select>
            </div>
            <button id="btn-main-vacances" class="btn-small" onclick="toggleTipo('VACANCES', 'btn-main-vacances')">vacances</button>
        </div>

        <div class="grid-action">
            <button class="btn-foto" onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-camera"></i></button>
            <button class="btn-submit" id="main-btn" onclick="enviar()"><i class="fa-solid fa-cloud-arrow-up"></i></button>
            <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="processarFoto(this, 'preview-foto')">
        </div>
        <img id="preview-foto" style="width:100%; border-radius:20px; display:none; margin-bottom:15px;">

        <div class="stats-container">
            <div id="txt-mes-atual" class="month-label">---</div>
            <div class="progress-label"><span>BASE (174h)</span><span id="txt-base">0h00m</span></div>
            <div class="bar-bg"><div id="bar-base" class="bar-fill"></div></div>
            <div class="progress-label"><span>SUPPLÉMENTAIRE</span><span id="txt-15">0h00m</span></div>
            <div class="bar-bg"><div id="bar-15" class="bar-fill"></div></div>
            <div class="progress-label"><span>EXTRA (TOTAL)</span><span id="txt-extra-real">0h</span></div>
            <div class="bar-bg"><div id="bar-extra-real" class="bar-fill" style="background-color: var(--color-done);"></div></div>
            <div class="progress-label"><span>REPAS</span><span id="txt-dinner">0</span></div>
            <div class="bar-bg"><div id="bar-dinner" class="bar-fill" style="background-color: var(--color-repas);"></div></div>
            <div class="progress-label"><span>VACANCES</span><span id="txt-vacances">160h</span></div>
            <div class="bar-bg"><div id="bar-vacances" class="bar-fill"></div></div>
        </div>

        <div class="manual-section" style="margin-bottom: 15px;">
            <button id="btn-manual-toggle" class="btn-small" style="width: 100%; background: var(--icon-active); color: white;" onclick="toggleManualForm()">SAISIE MANUELLE</button>
            <div id="manual-form" style="display: none; background: var(--card-stats); border-radius: 20px; padding: 15px; margin-top: 15px;">
                <div style="display: grid; gap: 15px;">
                    <input type="date" id="m-data" class="time-input" style="background: var(--card-ponto); border-radius: 12px; height: 35px;">
                    <div class="grid-2x2">
                        <div class="conge-container">
                            <button id="btn-m-conge" class="btn-small" style="width:100%" onclick="toggleTipoManual('CONGE', 'btn-m-conge')">congé</button>
                            <select id="hours-m-conge" class="select-hours">
                                <option value="1">1h</option><option value="4">4h</option><option value="8" selected>8h</option>
                            </select>
                        </div>
                        <button id="btn-m-vacances" class="btn-small" onclick="toggleTipoManual('VACANCES', 'btn-m-vacances')">vacances</button>
                    </div>
                    <div class="grid-2x2">
                        <input type="time" id="m-ent" class="time-input" value="07:00" style="background: var(--card-ponto); border-radius: 12px; height: 35px;">
                        <input type="time" id="m-sai" class="time-input" value="00:00" style="background: var(--card-ponto); border-radius: 12px; height: 35px;">
                    </div>
                    <button class="btn-submit" onclick="enviarManual()" style="padding:15px; font-size:16px;">ENVOYER MANUEL</button>
                </div>
            </div>
        </div>

        <div class="history-section">
            <span class="history-title">HISTORIQUE</span>
            <select class="select-mes" id="select-mes" onchange="consultarHistorico()"></select>
            <div class="history-list" id="lista-historico"></div>
        </div>
        <footer><i class="fa-solid fa-lock" onclick="resetToken()"></i></footer>
    </div>

<script>

    let USER_TOKEN = localStorage.getItem('muller_ponto_token');

    async function carregar() {
        if (!USER_TOKEN) {
            USER_TOKEN = prompt("PIN:");
            if (USER_TOKEN) localStorage.setItem('muller_ponto_token', USER_TOKEN);
            else return;
        }
        setupMeses();
        try {
            const res = await fetch(`${scriptURL}?token=${USER_TOKEN}`);
            const data = await res.json();
            acumuladoMes = data.acumulado;
            totalAlmocos = data.almocos;
            vacancesUtilizadasTotais = data.vacancesUsadas;
            saldoExtraServer = data.extraPermanente;
            document.getElementById('sync-status').innerText = "SYNCHRONISÉ";
            calc(); consultarHistorico();
        } catch(e) { document.getElementById('sync-status').innerText = "HORS LIGNE"; calc(); }
    }

    function setupMeses() {
        const select = document.getElementById('select-mes');
        const meses = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
        meses.forEach((m, i) => {
            let opt = document.createElement('option');
            opt.value = (i+1).toString().padStart(2, '0');
            opt.innerText = m;
            if (i === new Date().getMonth()) opt.selected = true;
            select.appendChild(opt);
        });
        document.getElementById('txt-mes-atual').innerText = meses[new Date().getMonth()];
    }

    function toggleTipo(tipo, btnId) {
        if (currentTipo === tipo) currentTipo = "NORMAL";
        else currentTipo = tipo;
        document.querySelectorAll('.grid-2x2 .btn-small').forEach(b => b.classList.remove('active', 'toggle'));
        if (currentTipo !== "NORMAL") document.getElementById(btnId).classList.add('active', 'toggle');
        calc();
    }

    function toggleTipoManual(tipo, btnId) {
        if (currentTipoManual === tipo) currentTipoManual = "NORMAL";
        else currentTipoManual = tipo;
        document.querySelectorAll('#manual-form .btn-small').forEach(b => b.classList.remove('active', 'toggle'));
        if (currentTipoManual !== "NORMAL") document.getElementById(btnId).classList.add('active', 'toggle');
    }

    function toggleSimple(checkId, cardId) {
        const cb = document.getElementById(checkId); cb.checked = !cb.checked;
        document.getElementById(cardId).classList.toggle('active', cb.checked);
        document.getElementById(cardId).classList.toggle('inactive', !cb.checked);
        calc();
    }

    function toggleMeal() {
        const cb = document.getElementById('check-almoco'); cb.checked = !cb.checked;
        document.getElementById('card-almoco').classList.toggle('active', cb.checked);
        document.getElementById('card-almoco').classList.toggle('inactive', !cb.checked);
        setMealTime(cb.checked ? 1 : 1.5);
    }

    function setMealTime(v) { 
        mealDuration = v; 
        document.getElementById('opt-1').classList.toggle('active', v===1);
        document.getElementById('opt-15').classList.toggle('active', v===1.5);
        calc(); 
    }

    function toCent(ts) { if(!ts) return 0; let [h, m] = ts.split(':').map(Number); return h + (m/60); }
    function formatTime(decimal) { let hrs = Math.floor(decimal); let mins = Math.round((decimal - hrs) * 60); return hrs + "h" + (mins < 10 ? "0" : "") + mins + "m"; }

    function calc() {
        let ent = toCent(document.getElementById('input-entrada').value);
        let sai = toCent(document.getElementById('input-saida').value);
        if (sai < ent && sai !== 0) sai += 24;

        let totalGeral = acumuladoMes + hoje;

        document.getElementById('bar-15').style.width = (Math.min(15, Math.max(0, totalGeral - 174))/15)*100 + "%";

            <div class="btn-card toggle inactive" id="card-almoco">
                <div class="meal-content">
                    <div class="meal-top" onclick="toggleMeal()">
                        <i class="fa-solid fa-utensils"></i>
                        <input type="checkbox" id="check-almoco" style="display:none" onchange="calc()">
                    </div>
                    <div class="meal-bottom">
                        <div class="meal-opt" id="opt-1" onclick="setMealTime(1)">1H</div>
                        <div class="meal-opt active" id="opt-15" onclick="setMealTime(1.5)">1H30</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid-small">
            <button id="btn-main-conge" class="btn-small" onclick="toggleTipo('CONGE', 'btn-main-conge')">congé</button>
            <button id="btn-main-vacances" class="btn-small" onclick="toggleTipo('VACANCES', 'btn-main-vacances')">vacances</button>
        </div>

        <div class="grid-action">
            <button class="btn-foto" onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-camera"></i></button>
            <button class="btn-submit" id="main-btn" onclick="enviar()"><i class="fa-solid fa-cloud-arrow-up"></i></button>
            <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="processarFoto(this, 'preview-foto')">
        </div>
        <img id="preview-foto">

        <div class="stats-container">
            <div id="txt-mes-atual" class="month-label">---</div>
            <div class="progress-label"><span>BASE (174h)</span><span id="txt-base">0h00m</span></div>
            <div class="bar-bg"><div id="bar-base" class="bar-fill"></div></div>
            <div class="progress-label"><span>SUPPLÉM. (+15h)</span><span id="txt-15">0h00m</span></div>
            <div class="bar-bg"><div id="bar-15" class="bar-fill"></div></div>
            <div class="progress-label"><span>EXTRA</span><span id="txt-extra-real">0h00m</span></div>
            <div class="bar-bg"><div id="bar-extra-real" class="bar-fill" style="background-color: var(--color-done);"></div></div>
            <div class="progress-label"><span>REPAS</span><span id="txt-dinner">0</span></div>
            <div class="bar-bg"><div id="bar-dinner" class="bar-fill" style="background-color: var(--color-repas);"></div></div>
            <div class="progress-label"><span>VACANCES (160h)</span><span id="txt-vacances">160h00m</span></div>
            <div class="bar-bg"><div id="bar-vacances" class="bar-fill"></div></div>
        </div>

        <div class="manual-section" style="margin-bottom: var(--gap-main);">
            <button id="btn-manual-toggle" class="btn-small" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;" onclick="toggleManualForm()">
                SAISIE MANUELLE <i class="fa-solid fa-chevron-down"></i>
            </button>
            <div id="manual-form" style="display: none; background: var(--card-stats); border-radius: 20px; padding: 15px; margin-top: 15px;">
                <div style="display: grid; gap: 15px;">
                    <div style="display: flex; flex-direction: column;"><label style="font-size: 10px; font-weight: 800; color: var(--text-secondary); margin-bottom: 4px;">DATE</label>
                    <input type="date" id="m-data" class="time-input" style="background: var(--bg); border-radius: 12px; height: 35px; box-sizing: border-box; font-size: 14px;"></div>
                    
                    <div class="grid-small">
                        <button id="btn-m-conge" class="btn-small" onclick="toggleTipoManual('CONGE', 'btn-m-conge')">congé</button>
                        <button id="btn-m-vacances" class="btn-small" onclick="toggleTipoManual('VACANCES', 'btn-m-vacances')">vacances</button>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div style="display: flex; flex-direction: column;"><label style="font-size: 10px; font-weight: 800; color: var(--text-secondary); margin-bottom: 4px;">ENTRÉE</label>
                        <input type="time" id="m-ent" class="time-input" value="07:00" style="background: var(--bg); border-radius: 12px; height: 35px; box-sizing: border-box;"></div>
                        <div style="display: flex; flex-direction: column;"><label style="font-size: 10px; font-weight: 800; color: var(--text-secondary); margin-bottom: 4px;">SORTIE</label>
                        <input type="time" id="m-sai" class="time-input" value="00:00" style="background: var(--bg); border-radius: 12px; height: 35px; box-sizing: border-box;"></div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="btn-card toggle active manual-btn-toggle" id="m-card-pausa" onclick="toggleSimpleManual('m-check-pausa', 'm-card-pausa')">
                            <i class="fa-solid fa-circle-pause"></i>
                            <input type="checkbox" id="m-check-pausa" style="display:none" checked>
                        </div>
                        <div class="btn-card toggle inactive manual-btn-toggle" id="m-card-almoco" onclick="toggleSimpleManual('m-check-almoco', 'm-card-almoco')">
                            <i class="fa-solid fa-utensils"></i>
                            <input type="checkbox" id="m-check-almoco" style="display:none">
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 4fr; gap: 15px; align-items: stretch;">
                        <button class="btn-foto" style="height: 50px; border-radius: 15px; font-size: 16px;" onclick="document.getElementById('file-input-manual').click()"><i class="fa-solid fa-camera"></i></button>
                        <button id="btn-manual-submit" class="btn-submit" onclick="enviarManual()" style="padding:0; height: 50px; border-radius: 15px;"><i class="fa-solid fa-cloud-arrow-up"></i></button>
                        <input type="file" id="file-input-manual" accept="image/*" style="display:none;" onchange="processarFoto(this, 'preview-foto-manual')">
                    </div>
                    <img id="preview-foto-manual">
                </div>
            </div>
        </div>

        <div class="history-section">
            <span class="history-title">HISTORIQUE</span>
            <div class="history-list" id="lista-historico"></div>
        </div>

        <footer>
            <i class="fa-solid fa-lock" onclick="resetToken()" style="cursor:pointer"></i>
        </footer>
    </div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbybPdOUUj8O5JNQ3HJJ-mKf9UZCplI9pUxRN5ypad96qbQ9RUzyQh6NA40V2rb7buK8/exec";
    
    let acumuladoMes = 0; let totalAlmocos = 0; let mealDuration = 1.5; let fotoBase64 = "";
    let vacancesUtilizadasTotais = 0;
    let currentTipo = "NORMAL";
    let currentTipoManual = "NORMAL";
    let USER_TOKEN = localStorage.getItem('muller_ponto_token');

    async function carregar() {
        if (!USER_TOKEN) {
            USER_TOKEN = prompt("Introduza o PIN de acesso:");
            if (USER_TOKEN) localStorage.setItem('muller_ponto_token', USER_TOKEN);
            else { alert("Acesso negado."); return; }
        }

        const mesesF = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
        document.getElementById('txt-mes-atual').innerText = mesesF[new Date().getMonth()];
        document.getElementById('input-entrada').value = localStorage.getItem('p_ent') || "07:00";
        document.getElementById('input-saida').value = localStorage.getItem('p_sai') || "00:00";
        
        const statusEl = document.getElementById('sync-status');
        try {
            const res = await fetch(`${scriptURL}?token=${USER_TOKEN}`, { mode: 'cors' });
            const data = await res.json();
            
            if (data.error) { alert("PIN Incorreto!"); resetToken(); return; }

            acumuladoMes = parseFloat(data.acumulado || 0);
            totalAlmocos = parseInt(data.almocos || 0);
            vacancesUtilizadasTotais = parseFloat(data.vacancesUsadas || 0);
            
            statusEl.innerText = "SYNCHRONISÉ";
            statusEl.style.color = "var(--color-done)";
            calc();
            consultarHistoricoAutomatico();
        } catch(e) { 
            statusEl.innerText = "HORS LIGNE"; 
            statusEl.style.color = "var(--color-pending)"; 
            calc(); 
        }
    }

    function resetToken() {
        localStorage.removeItem('muller_ponto_token');
        location.reload();
    }

    function toggleTipo(tipo, btnId) {
        const btn = document.getElementById(btnId);
        if (currentTipo === tipo) {
            currentTipo = "NORMAL";
            btn.classList.remove('active', 'toggle');
        } else {
            document.getElementById('btn-main-conge').classList.remove('active', 'toggle');
            document.getElementById('btn-main-vacances').classList.remove('active', 'toggle');
            currentTipo = tipo;
            btn.classList.add('active', 'toggle');
        }
        calc();
    }

    function toggleTipoManual(tipo, btnId) {
        const btn = document.getElementById(btnId);
        if (currentTipoManual === tipo) {
            currentTipoManual = "NORMAL";
            btn.classList.remove('active', 'toggle');
        } else {
            document.getElementById('btn-m-conge').classList.remove('active', 'toggle');
            document.getElementById('btn-m-vacances').classList.remove('active', 'toggle');
            currentTipoManual = tipo;
            btn.classList.add('active', 'toggle');
        }
    }

    function toggleManualForm() {
        const form = document.getElementById('manual-form');
        const btn = document.getElementById('btn-manual-toggle');
        const icon = btn.querySelector('i');
        form.style.display = (form.style.display === 'none' || form.style.display === '') ? 'block' : 'none';
        icon.classList.toggle('fa-chevron-down'); icon.classList.toggle('fa-chevron-up');
    }

    function toggleSimple(checkId, cardId) {
        const cb = document.getElementById(checkId);
        cb.checked = !cb.checked;
        const card = document.getElementById(cardId);
        if (cb.checked) { card.classList.replace('inactive', 'active'); } 
        else { card.classList.replace('active', 'inactive'); }
        calc();
    }

    function toggleSimpleManual(checkId, cardId) {
        const cb = document.getElementById(checkId);
        cb.checked = !cb.checked;
        const card = document.getElementById(cardId);
        if (cb.checked) { card.classList.replace('inactive', 'active'); } 
        else { card.classList.replace('active', 'inactive'); }
    }

    function toggleMeal() {
        const cb = document.getElementById('check-almoco');
        const card = document.getElementById('card-almoco');
        cb.checked = !cb.checked;
        if (cb.checked) { card.classList.replace('inactive', 'active'); setMealTime(1); } 
        else { card.classList.replace('active', 'inactive'); setMealTime(1.5); }
        calc();
    }

    function setMealTime(val) {
        mealDuration = val;
        document.getElementById('opt-1').classList.toggle('active', val === 1);
        document.getElementById('opt-15').classList.toggle('active', val === 1.5);
        calc();
    }

    function manualSave(tipo) {
        localStorage.setItem('p_' + tipo, document.getElementById('input-' + tipo).value);
        calc();
    }

    function toCent(ts) {
        if(!ts) return 0;
        let [h, m] = ts.split(':').map(Number);
        return h + (m/60);
    }

    function formatTime(decimal) {
        let hrs = Math.floor(decimal);
        let mins = Math.round((decimal - hrs) * 60);
        return hrs + "h" + (mins < 10 ? "0" : "") + mins + "m";
    }

    function calc() {
        let ent = toCent(document.getElementById('input-entrada').value);
        let sai = toCent(document.getElementById('input-saida').value);
        let descPausa = document.getElementById('check-pausa').checked ? 0.5 : 0;
        let descAlmoco = document.getElementById('check-almoco').checked ? mealDuration : 0;
        let totalDescontos = descPausa + descAlmoco;
        
        if (sai < ent && sai !== 0) sai += 24;
        
        let hoje = (sai > ent && currentTipo === "NORMAL") ? Math.max(0, sai - ent - totalDescontos) : 0;
        let totalGeral = acumuladoMes + hoje;
        
        // Progressão Normal
        let base = Math.min(totalGeral, 174);
        document.getElementById('bar-base').style.width = (base/174)*100 + "%";
        document.getElementById('bar-base').style.backgroundColor = totalGeral >= 174 ? "var(--color-done)" : "var(--color-pending)";
        document.getElementById('txt-base').innerText = formatTime(base);
        
        let extra = totalGeral > 174 ? Math.min(15, totalGeral - 174) : 0;
        document.getElementById('bar-15').style.width = (extra/15)*100 + "%";
        document.getElementById('bar-15').style.backgroundColor = totalGeral >= 189 ? "var(--color-done)" : "var(--color-pending)";
        document.getElementById('txt-15').innerText = formatTime(extra);

        let extraReal = totalGeral > 189 ? totalGeral - 189 : 0;
        document.getElementById('txt-extra-real').innerText = formatTime(extraReal);
        document.getElementById('bar-extra-real').style.width = Math.min(100, (extraReal / 10) * 100) + "%"; 

        // Repas
        let isTodayAlmoco = (document.getElementById('check-almoco').checked && currentTipo === "NORMAL") ? 1 : 0;
        document.getElementById('txt-dinner').innerText = totalAlmocos + isTodayAlmoco;
        document.getElementById('bar-dinner').style.width = Math.min(100, ((totalAlmocos + isTodayAlmoco)/22)*100) + "%";

        // VACANCES (Barra decrescente)
        let vacHoje = (currentTipo === "VACANCES") ? 8 : 0;
        let vacRestantes = 160 - (vacancesUtilizadasTotais + vacHoje);
        document.getElementById('txt-vacances').innerText = formatTime(Math.max(0, vacRestantes));
        
        let barVac = document.getElementById('bar-vacances');
        barVac.style.width = (Math.max(0, vacRestantes) / 160) * 100 + "%";
        barVac.style.backgroundColor = vacRestantes <= 24 ? "var(--color-pending)" : "var(--color-vacances)";
    }

    async function consultarHistoricoAutomatico() {
        const mes = (new Date().getMonth() + 1).toString().padStart(2, '0');
        const lista = document.getElementById('lista-historico');
        try {
            const res = await fetch(`${scriptURL}?action=getHistory&mes=${mes}&token=${USER_TOKEN}`, { mode: 'cors' });
            const logs = await res.json();
            if (logs.error) return;

            let listaHTML = logs.slice(0, 5).map(log => {
                const totalDia = parseFloat(log.total) || 0;
                const totalF = log.tipo !== "NORMAL" ? log.tipo : formatTime(totalDia);
                return `<div class="history-item"><span>${log.data}</span><span class="h-total">${totalF}</span><span class="h-extra">${log.extra > 0 && log.tipo === 'NORMAL' ? '+'+formatTime(parseFloat(log.extra)) : '-'}</span></div>`;
            }).join('');
            lista.innerHTML = logs.length ? listaHTML : '<div style="text-align:center; font-size:11px;">AUCUNE DONNÉE</div>';
        } catch(e) {}
    }

    function processarFoto(input, previewId) {
        const file = input.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                fotoBase64 = canvas.toDataURL('image/jpeg', 0.7);
                document.getElementById(previewId).src = fotoBase64;
                document.getElementById(previewId).style.display = "block";
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    async function enviar() {
        if (!fotoBase64) { alert("⚠️ pas de foto ⚠️"); return; }
        const btn = document.getElementById('main-btn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; btn.disabled = true;
        const payload = {
            token: USER_TOKEN,
            data: new Date().toISOString().split('T')[0],
            tipo: currentTipo,
            entrada: toCent(document.getElementById('input-entrada').value), 
            saida: toCent(document.getElementById('input-saida').value),
            almocoDuracao: (document.getElementById('check-pausa').checked ? 0.5 : 0) + (document.getElementById('check-almoco').checked ? mealDuration : 0),
            subAlmoco: document.getElementById('check-almoco').checked ? 1 : 0,
            foto: fotoBase64
        };
        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Succès!"); location.reload();
        } catch (e) { alert("Erreur"); btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i>'; }
    }

    async function enviarManual() {
        if (!fotoBase64) { alert("⚠️ pas de foto ⚠️"); return; }
        const dataInput = document.getElementById('m-data').value;
        if (!dataInput) { alert("⚠️ Date? ⚠️"); return; }
        const btn = document.getElementById('btn-manual-submit');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>'; btn.disabled = true;
        const payload = {
            token: USER_TOKEN,
            data: dataInput,
            tipo: currentTipoManual,
            entrada: toCent(document.getElementById('m-ent').value), 
            saida: toCent(document.getElementById('m-sai').value),
            almocoDuracao: (document.getElementById('m-check-pausa').checked ? 0.5 : 0) + (document.getElementById('m-check-almoco').checked ? 1.5 : 0),
            subAlmoco: document.getElementById('m-check-almoco').checked ? 1 : 0,
            foto: fotoBase64
        };
        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Succès!"); location.reload();
        } catch (e) { alert("Erreur"); btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i>'; }
    }

    window.onload = carregar;
</script>
</body>
</html>
