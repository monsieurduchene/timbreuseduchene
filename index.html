<!DOCTYPE html>
<html lang="fr-CH">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pointage Müller</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Giga:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">

    <style>
        :root { 
            --bg: #ffffff; --header-bg: #212121; --header-text: #fafafa; 
            --card-ponto: #f5f5f5; --card-toggle: #e0e0e0; --card-stats: #eeeeee; 
            --btn-foto: #bdbdbd; --btn-submit: #9e9e9e; --text: #212121; 
            --text-secondary: #757575; --icon-active: #424242; --bar-bg: #e0e0e0;
            --color-pending: #FF6663; --color-done: #81c784; 
            --gap-main: 15px; 
            --color-repas: #f9b560; 
            --color-vacances: #79649E;
        }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; color: var(--text); -webkit-tap-highlight-color: transparent; }
        
        header { 
            background: var(--header-bg); color: var(--header-text); padding: 40px 15px; 
            margin-bottom: var(--gap-main); text-align: center; 
            border-radius: 0 0 20px 20px; width: 100%; box-sizing: border-box;
        }
        
        .header-title { font-family: 'Lexend Giga', sans-serif; font-weight: 800; font-size: 24px; letter-spacing: -1.5px; text-transform: uppercase; line-height: 1; }
        
        #sync-status { display: block; font-size: 10px; font-weight: 900; margin-top: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); transition: color 0.3s ease; }

        .main-container { max-width: 400px; margin: 0 auto; padding: 0 15px; box-sizing: border-box; padding-bottom: 60px; }
        
        .grid-2x2, .grid-small, .grid-action { display: grid; gap: 15px; margin-bottom: var(--gap-main); }
        .grid-2x2 { grid-template-columns: 1fr 1fr; }
        .grid-small { grid-template-columns: 1fr 1fr; }
        .grid-action { grid-template-columns: 1fr 4fr; align-items: stretch; }
        .grid-20-80 { display: grid; grid-template-columns: 1fr 4fr; gap: 15px; margin-bottom: var(--gap-main); }

        .btn-card { border-radius: 20px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; position: relative; transition: all 0.2s ease; }
        .btn-card.time { background: var(--card-ponto); padding: 10px; box-sizing: border-box; }
        .btn-card.time i { color: var(--icon-active); opacity: 1; margin-bottom: 5px; }

        .time-input { border: none; background: transparent; font-size: 16px; font-weight: 800; color: var(--text); font-family: inherit; width: 100%; text-align: center; display: flex; justify-content: center; appearance: none; -webkit-appearance: none; }

        .btn-card.toggle { background: var(--card-toggle); cursor: pointer; }
        .btn-card i { font-size: 24px; color: var(--text-secondary); opacity: 0.7; pointer-events: none; }
        .toggle.active i { color: var(--icon-active); opacity: 1; }
        .toggle.active.btn-small { background: var(--icon-active); color: white; }
        .toggle.inactive { opacity: 0.4; filter: grayscale(1); }

        .meal-content { width: 100%; height: 100%; display: flex; flex-direction: column; }
        .meal-top { height: 65%; display: flex; align-items: center; justify-content: center; }
        .meal-bottom { height: 35%; display: flex; border-top: 1px solid rgba(0,0,0,0.05); background: rgba(0,0,0,0.03); }
        .meal-opt { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: var(--text-secondary); cursor: pointer; }
        .meal-opt.active { background: var(--icon-active); color: white; }
        .meal-bottom.locked { pointer-events: none; opacity: 0.5; }

        .btn-small { height: 35px; border-radius: 12px; background: var(--card-ponto); border: none; color: var(--text-secondary); font-weight: bold; font-size: 11px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }

        .btn-foto { width: 100%; background: var(--btn-foto); color: #fafafa; border: none; border-radius: 20px; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-submit { width: 100%; background: var(--btn-submit); color: #fafafa; border: none; padding: 25px; border-radius: 20px; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        #preview-foto, #preview-foto-manual { width: 100%; border-radius: 20px; display: none; margin-bottom: var(--gap-main); object-fit: cover; }

        .stats-container { background: var(--card-stats); border-radius: 20px; padding: 20px; margin-bottom: var(--gap-main); }
        .month-label { font-size: 10px; font-weight: 900; color: var(--text-secondary); text-align: center; margin-bottom: 15px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; }
        .progress-label { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px; font-weight: 800; color: #9e9e9e; text-transform: uppercase; }
        .bar-bg { background: var(--bar-bg); height: 12px; border-radius: 6px; overflow: hidden; margin-bottom: 15px; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.5s ease; }

        .history-section { margin-top: 10px; text-align: center; }
        .history-title { font-family: 'Lexend Giga', sans-serif; font-size: 14px; margin-bottom: 15px; display: block; width: 100%; background: var(--header-bg); color: #ffffff; padding: 12px 0; border-radius: 20px; text-transform: uppercase; }
        .select-mes { width: 100%; height: 35px; border-radius: 12px; border: none; background: var(--card-ponto); font-weight: bold; color: var(--text-secondary); font-size: 11px; margin-bottom: 15px; text-transform: uppercase; text-align: center; text-align-last: center; appearance: none; cursor: pointer; }
        .history-list { display: flex; flex-direction: column; gap: 8px; text-align: left; margin-bottom: 15px; }
        .history-item { display: grid; grid-template-columns: 2fr 1fr 1fr; background: var(--card-ponto); padding: 12px 15px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .h-extra { color: var(--color-done); text-align: right; }
        .h-total { text-align: center; }

        .manual-btn-toggle { height: 50px !important; border-radius: 15px !important; }

        .conge-row { display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 8px; margin-bottom: var(--gap-main); align-items: center; }
        .conge-hours { display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--card-ponto); border-radius: 12px; height: 35px; padding: 0 10px; gap: 2px; opacity: 0.4; pointer-events: none; transition: all 0.2s; }
        .conge-hours.visible { background: var(--icon-active); opacity: 1; pointer-events: auto; }
        .conge-hours label { font-size: 8px; font-weight: 900; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; line-height: 1; }
        .conge-hours.visible label { color: rgba(255,255,255,0.7); }
        .conge-hours select { background: transparent; border: none; color: var(--text-secondary); font-weight: 900; font-size: 13px; text-align: center; appearance: none; cursor: pointer; outline: none; padding: 0; width: 40px; }
        .conge-hours.visible select { color: #fff; }
        .conge-hours select option { background: #424242; color: #fff; }

        .notes-input::placeholder { color: var(--text-secondary); opacity: 0.6; }
        .month-btn { font-size: 10px; }
        .month-btn.active-month { background: var(--icon-active); color: #fff; }

        .notes-input { width: 100%; height: 35px; border: none; border-radius: 12px; background: var(--card-ponto); font-size: 11px; font-weight: 800; color: var(--text-secondary); text-align: center; text-transform: uppercase; letter-spacing: 1px; box-sizing: border-box; padding: 0 12px; margin-bottom: var(--gap-main); font-family: inherit; outline: none; }
        .notes-input::placeholder { color: var(--text-secondary); opacity: 0.5; }

        footer { text-align: center; padding: 20px; opacity: 0.3; font-size: 12px; }

        /* Toast notification */
        #toast { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px);
            background: #212121; color: #fff; padding: 12px 24px; border-radius: 20px;
            font-size: 13px; font-weight: 700; z-index: 9999;
            transition: transform 0.3s ease; pointer-events: none; white-space: nowrap;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
        #toast.success { background: #81c784; }
        #toast.error { background: #FF6663; }
        #toast.warning { background: #f57c00; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <div class="main-container">
        
        <header>
            <div class="header-content">
                <span class="header-title">POINTAGE MÜLLER</span>
                <span id="sync-status">AUTHENTIFICATION...</span>
            </div>
        </header>

        <div class="grid-2x2">
            <div class="btn-card time">
                <i class="fa-solid fa-right-to-bracket"></i>
                <input type="time" id="input-entrada" class="time-input" onchange="manualSave('ent')">
            </div>
            <div class="btn-card time">
                <i class="fa-solid fa-right-from-bracket"></i>
                <input type="time" id="input-saida" class="time-input" value="00:00" onchange="manualSave('sai')">
            </div>
        </div>

        <div class="grid-20-80">
            <div class="btn-card toggle active" id="card-pausa" onclick="toggleSimple('check-pausa', 'card-pausa')">
                <i class="fa-solid fa-circle-pause"></i>
                <input type="checkbox" id="check-pausa" style="display:none" checked onchange="calc()">
            </div>
            <div class="btn-card toggle inactive" id="card-almoco">
                <div class="meal-content">
                    <div class="meal-top" onclick="toggleMeal()">
                        <i class="fa-solid fa-utensils"></i>
                        <input type="checkbox" id="check-almoco" style="display:none" onchange="calc()">
                    </div>
                    <div class="meal-bottom" id="meal-bottom-main">
                        <div class="meal-opt" id="opt-1" onclick="setMealTime(1)">1H</div>
                        <div class="meal-opt active" id="opt-15" onclick="setMealTime(1.5)">1H30</div>
                    </div>
                </div>
            </div>
        </div>

        <input type="text" id="input-notes" placeholder="Usine" value="Usine"
            style="width:100%; height:35px; box-sizing:border-box; background:var(--card-ponto);
            border:none; border-radius:12px; padding:0 15px; font-size:11px; font-weight:800;
            color:var(--text-secondary); text-transform:uppercase; letter-spacing:1px;
            font-family:inherit; margin-bottom:var(--gap-main);">

        <div class="conge-row">
            <button id="btn-main-conge" class="btn-small" onclick="toggleTipo('CONGE', 'btn-main-conge')">congé</button>
            <div class="conge-hours" id="conge-hours-main">
                <label>heures</label>
                <select id="conge-h-main" onchange="congeHoursMain=parseInt(this.value);calc()">
                    <option>1</option><option>2</option><option>3</option><option>4</option>
                    <option>5</option><option>6</option><option>7</option><option value="8" selected>8</option>
                </select>
            </div>
            <button id="btn-main-vacances" class="btn-small" onclick="toggleTipo('VACANCES', 'btn-main-vacances')">vacances</button>
        </div>

        <input type="text" id="input-notes" class="notes-input" placeholder="USINE" maxlength="80">

        <div class="grid-action">
            <button class="btn-foto" onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-camera"></i></button>
            <button class="btn-submit" id="main-btn" onclick="enviar()"><i class="fa-solid fa-cloud-arrow-up"></i></button>
            <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="processarFoto(this, 'preview-foto', 'main')">
        </div>
        <img id="preview-foto">

        <div class="stats-container">
            <div id="txt-mes-atual" class="month-label">---</div>
            <div class="progress-label"><span>BASE (174h)</span><span id="txt-base">0h00m</span></div>
            <div class="bar-bg"><div id="bar-base" class="bar-fill"></div></div>
            <div class="progress-label"><span>SUPPLÉMENTAIRE</span><span id="txt-15">0h00m</span></div>
            <div class="bar-bg"><div id="bar-15" class="bar-fill"></div></div>
            <div class="progress-label"><span>EXTRA</span><span id="txt-extra-real">0h00m</span></div>
            <div class="bar-bg"><div id="bar-extra-real" class="bar-fill" style="background-color: var(--color-done);"></div></div>
            <div class="progress-label"><span>REPAS</span><span id="txt-dinner">0</span></div>
            <div class="bar-bg"><div id="bar-dinner" class="bar-fill" style="background-color: var(--color-repas);"></div></div>
            <div class="progress-label"><span>VACANCES</span><span id="txt-vacances">160h</span></div>
            <div class="bar-bg"><div id="bar-vacances" class="bar-fill"></div></div>
        </div>

        <div class="manual-section" style="margin-bottom: var(--gap-main);">
            <button id="btn-manual-toggle" class="btn-small" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--icon-active); color: white;" onclick="toggleManualForm()">
                SAISIE MANUELLE <i class="fa-solid fa-chevron-down"></i>
            </button>
            <div id="manual-form" style="display: none; background: var(--card-stats); border-radius: 20px; padding: 15px; margin-top: 15px;">
                <div style="display: grid; gap: 15px;">
                    <div style="display: flex; flex-direction: column;"><label style="font-size: 10px; font-weight: 800; color: var(--text-secondary); margin-bottom: 4px;">DATE</label>
                    <input type="date" id="m-data" class="time-input" style="background: var(--card-ponto); border-radius: 12px; height: 35px; box-sizing: border-box; font-size: 14px;"></div>
                    
                    <input type="text" id="m-notes" placeholder="Usine" value="Usine"
                        style="width:100%; height:35px; box-sizing:border-box; background:var(--card-ponto);
                        border:none; border-radius:12px; padding:0 15px; font-size:11px; font-weight:800;
                        color:var(--text-secondary); text-transform:uppercase; letter-spacing:1px;
                        font-family:inherit;">

                    <div class="conge-row" style="margin-bottom:0;">
                        <button id="btn-m-conge" class="btn-small" onclick="toggleTipoManual('CONGE', 'btn-m-conge')">congé</button>
                        <div class="conge-hours" id="conge-hours-manual">
                            <label>heures</label>
                            <select id="conge-h-manual" onchange="congeHoursManual=parseInt(this.value)">
                                <option>1</option><option>2</option><option>3</option><option>4</option>
                                <option>5</option><option>6</option><option>7</option><option value="8" selected>8</option>
                            </select>
                        </div>
                        <button id="btn-m-vacances" class="btn-small" onclick="toggleTipoManual('VACANCES', 'btn-m-vacances')">vacances</button>
                    </div>

                    <input type="text" id="m-notes" class="notes-input" placeholder="USINE" maxlength="80" style="margin-bottom:0;">

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div style="display: flex; flex-direction: column;"><label style="font-size: 10px; font-weight: 800; color: var(--text-secondary); margin-bottom: 4px;">ENTRÉE</label>
                        <input type="time" id="m-ent" class="time-input" value="07:00" style="background: var(--card-ponto); border-radius: 12px; height: 35px; box-sizing: border-box;"></div>
                        <div style="display: flex; flex-direction: column;"><label style="font-size: 10px; font-weight: 800; color: var(--text-secondary); margin-bottom: 4px;">SORTIE</label>
                        <input type="time" id="m-sai" class="time-input" value="00:00" style="background: var(--card-ponto); border-radius: 12px; height: 35px; box-sizing: border-box;"></div>
                    </div>
                    <input type="text" id="m-input-notes" class="notes-input" placeholder="USINE" maxlength="80" style="margin-bottom: 0;">

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="btn-card toggle active manual-btn-toggle" id="m-card-pausa" onclick="toggleSimpleManual('m-check-pausa', 'm-card-pausa')">
                            <i class="fa-solid fa-circle-pause"></i>
                            <input type="checkbox" id="m-check-pausa" style="display:none" checked>
                        </div>
                        <div class="btn-card toggle inactive manual-btn-toggle" id="m-card-almoco" onclick="toggleSimpleManual('m-check-almoco', 'm-card-almoco')">
                            <i class="fa-solid fa-utensils"></i>
                            <input type="checkbox" id="m-check-almoco" style="display:none">
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 4fr; gap: 15px; align-items: stretch;">
                        <button class="btn-foto" style="height: 50px; border-radius: 15px; font-size: 16px;" onclick="document.getElementById('file-input-manual').click()"><i class="fa-solid fa-camera"></i></button>
                        <button id="btn-manual-submit" class="btn-submit" onclick="enviarManual()" style="padding:0; height: 50px; border-radius: 15px;"><i class="fa-solid fa-cloud-arrow-up"></i></button>
                        <input type="file" id="file-input-manual" accept="image/*" style="display:none;" onchange="processarFoto(this, 'preview-foto-manual', 'manual')">
                    </div>
                    <img id="preview-foto-manual">
                </div>
            </div>
        </div>

        <div class="history-section">
            <span class="history-title">HISTORIQUE</span>
            <div id="month-grid" style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px;"></div>
            <div class="history-list" id="lista-historico"></div>
        </div>

        <footer>
            <i class="fa-solid fa-lock" onclick="resetToken()" style="cursor:pointer"></i>
        </footer>
    </div>

<script>
    // ─── CONFIG ───────────────────────────────────────────────────────────────
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzeUbkiuTH3aLu7YG2FmBo22-StfoH23nZ1JY-0wNvlCDIXCbM1jNlB9_rVuC1FuT51/exec";

    // ─── NAMED CONSTANTS (mirrors Apps Script) ────────────────────────────────
    const BASE_HOURS       = 174;
    const SUPPLEMENTARY_H  = 15;
    const TOTAL_REQUIRED_H = BASE_HOURS + SUPPLEMENTARY_H; // 189
    const MAX_VACATION_H   = 160;
    const WORKING_DAYS_EST = 22; // estimated working days for dinner bar
    const VACATION_DAY_H   = 8;

    // ─── STATE ────────────────────────────────────────────────────────────────
    let acumuladoMes             = 0;
    let totalAlmocos             = 0;
    let mealDuration             = 1.5;
    let fotoBase64Main           = "";
    let fotoBase64Manual         = "";
    let vacancesUtilizadasTotais = 0;
    let extraPermanente          = 0;  // running extra-hours balance from server
    let congeHoursMain           = 8;  // hours selected for main congé
    let congeHoursManual         = 8;  // hours selected for manual congé
    let currentTipo              = "NORMAL";
    let currentTipoManual        = "NORMAL";
    let USER_TOKEN               = localStorage.getItem('muller_ponto_token');

    // ─── TOAST ────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = '') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'show ' + type;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => { el.className = ''; }, 3000);
    }

    // ─── AUTH & LOAD ─────────────────────────────────────────────────────────
    async function carregar() {
        if (!USER_TOKEN) {
            USER_TOKEN = prompt("Introduza o PIN de acesso:");
            if (USER_TOKEN) localStorage.setItem('muller_ponto_token', USER_TOKEN);
            else { showToast("Acesso negado.", 'error'); return; }
        }

        const hoje = new Date();
        const mesAtualStr = (hoje.getMonth() + 1).toString().padStart(2, '0');
        buildMonthButtons();

        const mesesF = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
        document.getElementById('txt-mes-atual').innerText = mesesF[hoje.getMonth()];
        
        document.getElementById('input-entrada').value = localStorage.getItem('p_ent') || "07:00";
        document.getElementById('input-saida').value   = localStorage.getItem('p_sai') || "00:00";
        
        const statusEl = document.getElementById('sync-status');
        try {
            // NOTE: token is still in URL for GET (Apps Script doGet limitation).
            // For better security, consider restructuring to use doPost for all reads.
            const res  = await fetch(`${SCRIPT_URL}?token=${USER_TOKEN}`, { mode: 'cors' });
            const data = await res.json();
            if (data.error) { showToast("PIN Incorret!", 'error'); resetToken(); return; }
            acumuladoMes             = parseFloat(data.acumulado || 0);
            totalAlmocos             = parseInt(data.almocos || 0);
            vacancesUtilizadasTotais = parseFloat(data.vacancesUsadas || 0);
            extraPermanente          = parseFloat(data.extraPermanente || 0);
            statusEl.innerText       = "SYNCHRONISÉ";
            statusEl.style.color     = "var(--color-done)";
            calc();
            consultarHistorico();
        } catch(e) {
            statusEl.innerText   = "HORS LIGNE";
            statusEl.style.color = "var(--color-pending)";
            calc();
        }
    }

    function resetToken() { localStorage.removeItem('muller_ponto_token'); location.reload(); }

    // ─── TYPE TOGGLES ─────────────────────────────────────────────────────────
    function toggleTipo(tipo, btnId) {
        const btn = document.getElementById(btnId);
        if (currentTipo === tipo) {
            currentTipo = "NORMAL";
            btn.classList.remove('active', 'toggle');
        } else {
            document.getElementById('btn-main-conge').classList.remove('active', 'toggle');
            document.getElementById('btn-main-vacances').classList.remove('active', 'toggle');
            currentTipo = tipo;
            btn.classList.add('active', 'toggle');
        }
        document.getElementById('conge-hours-main').classList.toggle('visible', currentTipo === 'CONGE');
        calc();
    }

    function toggleTipoManual(tipo, btnId) {
        const btn = document.getElementById(btnId);
        if (currentTipoManual === tipo) {
            currentTipoManual = "NORMAL";
            btn.classList.remove('active', 'toggle');
        } else {
            document.getElementById('btn-m-conge').classList.remove('active', 'toggle');
            document.getElementById('btn-m-vacances').classList.remove('active', 'toggle');
            currentTipoManual = tipo;
            btn.classList.add('active', 'toggle');
        }
        document.getElementById('conge-hours-manual').classList.toggle('visible', currentTipoManual === 'CONGE');
        calc();
    }

    // ─── UI HELPERS ───────────────────────────────────────────────────────────
    function toggleManualForm() {
        const form = document.getElementById('manual-form');
        const icon = document.getElementById('btn-manual-toggle').querySelector('i');
        const isOpen = form.style.display === 'block';
        form.style.display = isOpen ? 'none' : 'block';
        icon.classList.toggle('fa-chevron-down', isOpen);
        icon.classList.toggle('fa-chevron-up', !isOpen);
        calc();
    }

    function toggleSimple(checkId, cardId) {
        const cb = document.getElementById(checkId);
        cb.checked = !cb.checked;
        document.getElementById(cardId).classList.replace(cb.checked ? 'inactive' : 'active', cb.checked ? 'active' : 'inactive');
        calc();
    }

    function toggleSimpleManual(checkId, cardId) {
        const cb = document.getElementById(checkId);
        cb.checked = !cb.checked;
        document.getElementById(cardId).classList.replace(cb.checked ? 'inactive' : 'active', cb.checked ? 'active' : 'inactive');
    }

    function toggleMeal() {
        const cb     = document.getElementById('check-almoco');
        const card   = document.getElementById('card-almoco');
        const bottom = document.getElementById('meal-bottom-main');
        cb.checked = !cb.checked;
        if (cb.checked) {
            // Repas mode: force 1H, lock selector
            card.classList.replace('inactive', 'active');
            setMealTime(1);
            bottom.classList.add('locked');
        } else {
            // Factory mode: unlock selector, reset to 1H30
            card.classList.replace('active', 'inactive');
            setMealTime(1.5);
            bottom.classList.remove('locked');
        }
        calc();
    }

    function setMealTime(val) {
        mealDuration = val;
        document.getElementById('opt-1').classList.toggle('active', val === 1);
        document.getElementById('opt-15').classList.toggle('active', val === 1.5);
        calc();
    }

    // ─── TIME UTILS ───────────────────────────────────────────────────────────
    function manualSave(tipo) { localStorage.setItem('p_' + tipo, document.getElementById('input-' + tipo).value); calc(); }
    function toCent(ts)       { if(!ts) return 0; let [h, m] = ts.split(':').map(Number); return h + (m / 60); }
    function formatTime(dec)  { let h = Math.floor(dec); let m = Math.round((dec - h) * 60); return h + "h" + (m < 10 ? "0" : "") + m + "m"; }

    // ─── CALC ─────────────────────────────────────────────────────────────────
    function calc() {
        let ent      = toCent(document.getElementById('input-entrada').value);
        let sai      = toCent(document.getElementById('input-saida').value);
        let descPausa  = document.getElementById('check-pausa').checked ? 0.5 : 0;
        // Always deduct lunch. mealDuration=1.5 (factory default) or 1 (short/repas)
        let descAlmoco = mealDuration;
        if (sai < ent && sai !== 0) sai += 24;

        let hoje      = (sai > ent && currentTipo === "NORMAL") ? Math.max(0, sai - ent - (descPausa + descAlmoco)) : 0;
        let totalGeral = acumuladoMes + hoje;

        // Base bar
        let base = Math.min(totalGeral, BASE_HOURS);
        document.getElementById('bar-base').style.width           = (base / BASE_HOURS) * 100 + "%";
        document.getElementById('bar-base').style.backgroundColor = totalGeral >= BASE_HOURS ? "var(--color-done)" : "var(--color-pending)";
        document.getElementById('txt-base').innerText             = formatTime(base);

        // Supplementary bar (15h window within current month)
        let extra = totalGeral > BASE_HOURS ? Math.min(SUPPLEMENTARY_H, totalGeral - BASE_HOURS) : 0;
        document.getElementById('bar-15').style.width           = (extra / SUPPLEMENTARY_H) * 100 + "%";
        document.getElementById('bar-15').style.backgroundColor = totalGeral >= TOTAL_REQUIRED_H ? "var(--color-done)" : "var(--color-pending)";
        document.getElementById('txt-15').innerText             = formatTime(extra);

        // Permanent extra balance: server value + today's unsaved preview
        // If CONGE today: subtract the selected congé hours from the balance
        let extraPreviewDelta = 0;
        if (currentTipo === "NORMAL" && hoje > 0) extraPreviewDelta = hoje;
        if (currentTipo === "CONGE")  extraPreviewDelta = -congeHoursMain;
        let extraTotal = extraPermanente + extraPreviewDelta;
        const extraAbs = Math.abs(extraTotal);
        document.getElementById('txt-extra-real').innerText         = (extraTotal < 0 ? "-" : "+") + formatTime(extraAbs);
        document.getElementById('bar-extra-real').style.width       = Math.min(100, (extraAbs / 20) * 100) + "%";
        document.getElementById('bar-extra-real').style.backgroundColor = extraTotal < 0 ? "var(--color-pending)" : "var(--color-done)";

        // Dinner bar
        let isTodayAlmoco = (document.getElementById('check-almoco').checked && currentTipo === "NORMAL") ? 1 : 0;
        document.getElementById('txt-dinner').innerText        = totalAlmocos + isTodayAlmoco;
        document.getElementById('bar-dinner').style.width      = Math.min(100, ((totalAlmocos + isTodayAlmoco) / WORKING_DAYS_EST) * 100) + "%";

        // FIX: vacation only counts if main form type is VACANCES, OR manual form is open AND its type is VACANCES.
        // The manual form being open alone doesn't add vacation hours — only when VACANCES is explicitly selected.
        let vacMain   = currentTipo === "VACANCES" ? VACATION_DAY_H : 0;
        let vacManual = (document.getElementById('manual-form').style.display === 'block' && currentTipoManual === "VACANCES") ? VACATION_DAY_H : 0;
        // Avoid double-counting if both are VACANCES on same day (shouldn't happen but guard it)
        let vacHoje     = Math.max(vacMain, vacManual);
        let vacRestantes = MAX_VACATION_H - (vacancesUtilizadasTotais + vacHoje);

        document.getElementById('txt-vacances').innerText   = Math.max(0, vacRestantes) + "h";
        let barVac = document.getElementById('bar-vacances');
        barVac.style.width           = (Math.max(0, vacRestantes) / MAX_VACATION_H) * 100 + "%";
        barVac.style.backgroundColor = vacRestantes <= 24 ? "var(--color-pending)" : "var(--color-vacances)";
    }

    // ─── MONTH BUTTONS ────────────────────────────────────────────────────────
    const MOIS = ["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
    let selectedMes = (new Date().getMonth() + 1).toString().padStart(2, '0');

    function buildMonthButtons() {
        const grid = document.getElementById('month-grid');
        grid.innerHTML = '';
        MOIS.forEach((label, i) => {
            const val = (i + 1).toString().padStart(2, '0');
            const btn = document.createElement('button');
            btn.textContent = label;
            btn.className   = 'btn-small month-btn';
            btn.dataset.mes = val;
            if (val === selectedMes) btn.classList.add('active-month');
            btn.onclick = () => selectMonth(val);
            grid.appendChild(btn);
        });
    }

    function selectMonth(val) {
        selectedMes = val;
        document.querySelectorAll('.month-btn').forEach(b => {
            b.classList.toggle('active-month', b.dataset.mes === val);
        });
        consultarHistorico();
    }

    // ─── HISTORY ──────────────────────────────────────────────────────────────
    async function consultarHistorico() {
        const lista = document.getElementById('lista-historico');
        lista.innerHTML = '<div style="text-align:center; font-size:11px; padding:20px; color:var(--text-secondary);">CHARGEMENT...</div>';
        try {
            const res  = await fetch(`${SCRIPT_URL}?action=getHistory&mes=${selectedMes}&token=${USER_TOKEN}`, { mode: 'cors' });
            const data = await res.json();
            // FIX: guard against unexpected non-array response (e.g. error object or stats object)
            const logs = Array.isArray(data) ? data : [];
            let listaHTML = logs.map(log => {
                const totalF = log.tipo !== "NORMAL" ? log.tipo : formatTime(parseFloat(log.total));
                return `<div class="history-item"><span>${log.data}</span><span class="h-total">${totalF}</span><span class="h-extra">${log.extra > 0 && log.tipo === 'NORMAL' ? '+' + formatTime(parseFloat(log.extra)) : '-'}</span></div>`;
            }).join('');
            lista.innerHTML = logs.length ? listaHTML : '<div style="text-align:center; font-size:11px; padding:20px;">AUCUNE DONNÉE</div>';
        } catch(e) { lista.innerHTML = '<div style="text-align:center; font-size:11px; padding:20px; color:var(--color-pending);">Erreur de chargement</div>'; }
    }

    // ─── PHOTO ────────────────────────────────────────────────────────────────
    // FIX: accepts a 'form' param ('main' or 'manual') and stores in the correct variable
    function processarFoto(input, previewId, form) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas    = document.createElement('canvas');
                const MAX_WIDTH = 800;
                const scale     = MAX_WIDTH / img.width;
                canvas.width    = MAX_WIDTH;
                canvas.height   = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                const b64 = canvas.toDataURL('image/jpeg', 0.7);
                if (form === 'main')   fotoBase64Main   = b64;
                if (form === 'manual') fotoBase64Manual = b64;
                document.getElementById(previewId).src          = b64;
                document.getElementById(previewId).style.display = "block";
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    // ─── SUBMIT (TODAY) ───────────────────────────────────────────────────────
    async function enviar() {
        if (!fotoBase64Main && currentTipo === 'NORMAL') { showToast("⚠️ pas de photo ⚠️", 'warning'); return; }
        const btn = document.getElementById('main-btn');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
        btn.disabled  = true;

        const descPausa  = document.getElementById('check-pausa').checked ? 0.5 : 0;
        const descAlmoco = mealDuration; // always deducted; 1.5 factory, 1 if repas

        const payload = {
            token:        USER_TOKEN,
            data:         new Date().toISOString().split('T')[0],
            tipo:         currentTipo,
            entrada:      toCent(document.getElementById('input-entrada').value),
            saida:        toCent(document.getElementById('input-saida').value),
            almocoDuracao: descPausa + descAlmoco,
            horasConge:   congeHoursMain,
            subAlmoco:    document.getElementById('check-almoco').checked ? 1 : 0,
            notes:        document.getElementById('input-notes').value.trim() || 'Usine',
            foto:         fotoBase64Main
        };
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            showToast("Envoyé avec succès !", 'success');
            setTimeout(() => location.reload(), 1500);
        } catch(e) {
            showToast("Erreur d'envoi", 'error');
            btn.disabled  = false;
            btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i>';
        }
    }

    // ─── SUBMIT (MANUAL) ─────────────────────────────────────────────────────
    async function enviarManual() {
        if (!fotoBase64Manual && currentTipoManual === 'NORMAL') { showToast("⚠️ pas de photo ⚠️", 'warning'); return; }
        const dataInput = document.getElementById('m-data').value;
        if (!dataInput) { showToast("⚠️ Date manquante ⚠️", 'warning'); return; }

        const btn = document.getElementById('btn-manual-submit');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
        btn.disabled  = true;

        const descPausa  = document.getElementById('m-check-pausa').checked ? 0.5 : 0;
        const descAlmoco = mealDuration; // always deducted; 1.5 factory, 1 if repas

        const payload = {
            token:         USER_TOKEN,
            data:          dataInput,
            tipo:          currentTipoManual,
            entrada:       toCent(document.getElementById('m-ent').value),
            saida:         toCent(document.getElementById('m-sai').value),
            almocoDuracao: descPausa + descAlmoco,
            horasConge:    congeHoursManual,
            subAlmoco:     document.getElementById('m-check-almoco').checked ? 1 : 0,
            notes:         document.getElementById('m-notes').value.trim() || 'Usine',
            foto:          fotoBase64Manual
        };
        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            showToast("Envoyé avec succès !", 'success');
            setTimeout(() => location.reload(), 1500);
        } catch(e) {
            showToast("Erreur d'envoi", 'error');
            btn.disabled  = false;
            btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i>';
        }
    }

    window.onload = carregar;
</script>
