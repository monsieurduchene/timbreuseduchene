<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ponto Smart Pro</title>
    <style>
        :root { --bg: #efefef; --card: #efefef; --shadow: #d1d1d1; --white: #ffffff; --accent: #ff6b35; --blue: #3498db; --green: #2ecc71; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #333; }
        .card { background: var(--card); border-radius: 25px; padding: 20px; box-shadow: 9px 9px 16px var(--shadow), -9px -9px 16px var(--white); margin-bottom: 20px; }
        .grid-ponto { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .btn-ponto { background: var(--card); border-radius: 22px; padding: 25px 10px; text-align: center; box-shadow: 6px 6px 12px var(--shadow), -6px -6px 12px var(--white); cursor: pointer; border: none; }
        .time-input { border: none; background: transparent; font-size: 26px; font-weight: bold; color: var(--accent); width: 100%; text-align: center; pointer-events: none; }
        .btn-foto { width: 100%; background: #444; color: white; border: none; padding: 16px; border-radius: 18px; margin-bottom: 15px; font-weight: bold; }
        #preview-foto { width: 100%; border-radius: 15px; display: none; margin-bottom: 20px; border: 2px solid #fff; }
        .btn-submit { width: 100%; background: var(--green); color: white; border: none; padding: 22px; border-radius: 22px; font-size: 18px; font-weight: bold; }
        .progress-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 6px; font-weight: bold; }
        .bar-bg { background: #e0e0e0; height: 10px; border-radius: 5px; overflow: hidden; margin-bottom: 15px; }
        .bar-fill { height: 100%; width: 0%; transition: width 1s; }
        .fill-normal { background: var(--blue); }
        .fill-acordo { background: var(--accent); }
    </style>
</head>
<body>

<div style="max-width:400px; margin:0 auto;">
    <header style="margin-bottom:20px;">
        <span id="sync-status" style="font-size:10px; color:#888;">Sincronizando...</span>
        <h1 style="margin:0;">Meu Registo</h1>
    </header>

    <div class="grid-ponto">
        <div class="btn-ponto" onclick="document.getElementById('input-entrada').showPicker()">
            <label style="font-size:11px; color:#999; font-weight:bold; display:block;">ENTRADA</label>
            <input type="time" id="input-entrada" class="time-input" onchange="manualSave('ent')">
        </div>
        <div class="btn-ponto" onclick="document.getElementById('input-saida').showPicker()">
            <label style="font-size:11px; color:#999; font-weight:bold; display:block;">SAÍDA</label>
            <input type="time" id="input-saida" class="time-input" onchange="manualSave('sai')">
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span>Pausa (30 min)</span>
            <input type="checkbox" id="check-pausa" checked onchange="calc()">
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:15px;">
            <span>Almoço (+Subsidio)</span>
            <input type="checkbox" id="check-almoco" onchange="toggleAlmoco()">
        </div>
        <div id="area-almoco" style="display:none; margin-top:10px;">
            <select id="select-almoco" onchange="calc()" style="width:100%; padding:10px; border-radius:10px;">
                <option value="1">1.0 hora</option>
                <option value="1.5">1.5 horas</option>
            </select>
        </div>
    </div>

    <button class="btn-foto" id="btn-foto-ui" onclick="document.getElementById('file-input').click()">📷 Tirar Foto do Cartão</button>
    <input type="file" id="file-input" accept="image/*" capture="camera" style="display:none;" onchange="processarFoto()">
    <img id="preview-foto">

    <button class="btn-submit" id="main-btn" onclick="enviar()">Submeter Registo</button>

    <div class="card" style="opacity:0.9;">
        <div class="progress-label"><span>Base (174h)</span><span id="txt-normal">0/174h</span></div>
        <div class="bar-bg"><div id="bar-normal" class="bar-fill fill-normal"></div></div>
        <div class="progress-label"><span>Acordo (15h)</span><span id="txt-acordo">0/15h</span></div>
        <div class="bar-bg"><div id="bar-acordo" class="bar-fill fill-acordo"></div></div>
        <div style="display:flex; justify-content:space-between; font-size:13px; font-weight:bold;">
            <span>Dias com Almoço:</span>
            <span id="contagem-almocos" style="color:var(--green);">0</span>
        </div>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwc1hOHtBYQbygRKN-1XWmlBJUAOyFuCc4sYtqb8b3aygSO3JRoUIebA19i_6mNwmxX/exec"; // <--- COLA AQUI O TEU LINK EXEC
    let acumuladoMes = 0;
    let fotoBase64 = "";

    async function carregar() {
        document.getElementById('input-entrada').value = localStorage.getItem('p_ent') || "";
        document.getElementById('input-saida').value = localStorage.getItem('p_sai') || "";
        try {
            const res = await fetch(scriptURL);
            const data = await res.json();
            acumuladoMes = parseFloat(data.acumulado || 0);
            document.getElementById('contagem-almocos').innerText = data.almocos || 0;
            document.getElementById('sync-status').innerText = "✅ Sincronizado";
            calc();
        } catch(e) { document.getElementById('sync-status').innerText = "⚠️ Offline"; calc(); }
    }

    // FUNÇÃO QUE COMPRIME A FOTO ANTES DE ENVIAR
    function processarFoto() {
        const file = document.getElementById('file-input').files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800; // Reduz a largura para 800px (suficiente para ler o cartão)
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // Transforma em JPEG com 70% de qualidade para ser leve
                fotoBase64 = canvas.toDataURL('image/jpeg', 0.7);
                document.getElementById('preview-foto').src = fotoBase64;
                document.getElementById('preview-foto').style.display = "block";
                document.getElementById('btn-foto-ui').innerText = "✅ Foto Pronta";
                document.getElementById('btn-foto-ui').style.background = "#2ecc71";
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function manualSave(tipo) {
        localStorage.setItem('p_' + tipo, document.getElementById('input-' + tipo).value);
        calc();
    }

    function toggleAlmoco() {
        document.getElementById('area-almoco').style.display = document.getElementById('check-almoco').checked ? "block" : "none";
        calc();
    }

    function toCent(ts) {
        if(!ts) return 0;
        let [h, m] = ts.split(':').map(Number);
        return h + (m/60);
    }

    function calc() {
        let ent = toCent(document.getElementById('input-entrada').value);
        let sai = toCent(document.getElementById('input-saida').value);
        let desc = (document.getElementById('check-pausa').checked ? 0.5 : 0) + 
                   (document.getElementById('check-almoco').checked ? parseFloat(document.getElementById('select-almoco').value) : 0);
        let hoje = (sai > ent) ? (sai - ent - desc) : 0;
        let total = acumuladoMes + hoje;
        document.getElementById('bar-normal').style.width = Math.min(100, (total/174)*100) + "%";
        document.getElementById('txt-normal').innerText = Math.min(total, 174).toFixed(2) + "/174h";
        let acordo = total > 174 ? Math.min(15, total - 174) : 0;
        document.getElementById('bar-acordo').style.width = (acordo/15)*100 + "%";
        document.getElementById('txt-acordo').innerText = acordo.toFixed(2) + "/15h";
    }

    async function enviar() {
        const btn = document.getElementById('main-btn');
        btn.innerText = "Enviando..."; btn.disabled = true;
        let desc = (document.getElementById('check-pausa').checked ? 0.5 : 0) + 
                   (document.getElementById('check-almoco').checked ? parseFloat(document.getElementById('select-almoco').value) : 0);

        const payload = {
            data: new Date().toISOString().split('T')[0],
            entrada: toCent(document.getElementById('input-entrada').value),
            saida: toCent(document.getElementById('input-saida').value),
            almocoDuracao: desc,
            subAlmoco: document.getElementById('check-almoco').checked ? 16 : 0,
            foto: fotoBase64
        };

        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            localStorage.removeItem('p_ent'); localStorage.removeItem('p_sai');
            alert("Sucesso!"); location.reload();
        } catch (e) { alert("Erro!"); btn.disabled = false; btn.innerText = "Submeter Registo"; }
    }
    window.onload = carregar;
</script>
</body>
</html>
