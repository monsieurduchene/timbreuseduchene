<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ponto Pastel Pro</title>
    <style>
        :root { 
            --bg: #fafafa; 
            --card-ponto: #ffe5d9; /* Pêssego pastel */
            --card-options: #e2ece9; /* Menta pastel */
            --card-stats: #f0eff4; /* Lavanda pastel */
            --btn-foto: #d8e2dc; /* Cinza esverdeado pastel */
            --btn-submit: #94d2bd; /* Verde sálvia */
            --accent: #ff9b85; 
            --blue: #a2d2ff; 
            --text: #4a4a4a;
        }
        
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 15px; 
            color: var(--text); 
            -webkit-tap-highlight-color: transparent; 
        }
        
        header { margin-bottom: 25px; text-align: center; }
        h1 { margin: 0; font-size: 20px; font-weight: 600; letter-spacing: 1px; color: #777; }
        #sync-status { font-size: 9px; font-weight: bold; color: #aaa; }

        /* ESTILO PASTEL 2D - SEM BORDAS OU SOMBRAS */
        .card { 
            background: var(--card-options); 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 15px; 
        }
        
        .grid-ponto { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .btn-ponto { 
            background: var(--card-ponto); 
            border-radius: 20px; 
            height: 100px;
            position: relative; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }
        .btn-ponto label { font-size: 10px; color: #8d7b73; font-weight: 800; margin-bottom: 5px; z-index: 1; }
        
        .time-input { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: none; background: transparent; font-size: 26px; font-weight: bold; 
            color: #6d5952; text-align: center; font-family: inherit;
            padding-top: 20px; box-sizing: border-box; outline: none; z-index: 2;
        }

        .row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
        input[type="checkbox"] { width: 22px; height: 22px; filter: hue-rotate(140deg); }
        
        select { 
            padding: 12px; border-radius: 12px; border: none; 
            background: #ffffff; color: var(--text); font-weight: bold; 
            width: 100%; margin-top: 10px; outline: none;
        }

        .grid-foto { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn-foto-split { 
            background: var(--btn-foto); 
            color: #666; 
            border: none; 
            padding: 15px; 
            border-radius: 15px; 
            font-weight: bold; 
            font-size: 12px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 5px; 
        }
        
        #preview-foto { width: 100%; border-radius: 15px; display: none; margin-bottom: 15px; }

        .btn-submit { 
            width: 100%; 
            background: var(--btn-submit); 
            color: #466b5e; 
            border: none; 
            padding: 22px; 
            border-radius: 20px; 
            font-size: 18px; 
            font-weight: 800; 
            cursor: pointer;
        }

        /* BARRAS */
        .progress-label { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px; font-weight: bold; color: #888; }
        .bar-bg { background: #fff; height: 14px; border-radius: 7px; overflow: hidden; margin-bottom: 12px; }
        .bar-fill { height: 100%; width: 0%; transition: width 1s; }
        .fill-normal { background: var(--blue); }
        .fill-acordo { background: var(--accent); }
    </style>
</head>
<body>

<div style="max-width:400px; margin:0 auto;">
    <header>
        <h1>REGISTO</h1>
        <span id="sync-status">Sincronizando...</span>
    </header>

    <div class="grid-ponto">
        <div class="btn-ponto">
            <label>ENTRADA</label>
            <input type="time" id="input-entrada" class="time-input" onchange="manualSave('ent')">
        </div>
        <div class="btn-ponto">
            <label>SAÍDA</label>
            <input type="time" id="input-saida" class="time-input" onchange="manualSave('sai')">
        </div>
    </div>

    <div class="card">
        <div class="row">
            <span style="font-weight: bold;">Pausa Fixa (30min)</span>
            <input type="checkbox" id="check-pausa" checked onchange="calc()">
        </div>
        <div class="row">
            <span style="font-weight: bold;">Sub. Almoço</span>
            <input type="checkbox" id="check-almoco" onchange="toggleAlmoco()">
        </div>
        <div id="area-almoco" style="display:none;">
            <select id="select-almoco" onchange="calc()">
                <option value="1">1.0 hora</option>
                <option value="1.5">1.5 horas</option>
            </select>
        </div>
    </div>

    <div class="grid-foto">
        <button class="btn-foto-split" onclick="document.getElementById('file-camera').click()">
            <span>📷</span> CÂMARA
        </button>
        <button class="btn-foto-split" onclick="document.getElementById('file-gallery').click()">
            <span>🖼️</span> GALERIA
        </button>
    </div>

    <input type="file" id="file-camera" accept="image/*" capture="camera" style="display:none;" onchange="processarFoto(this)">
    <input type="file" id="file-gallery" accept="image/*" style="display:none;" onchange="processarFoto(this)">
    <img id="preview-foto">

    <button class="btn-submit" id="main-btn" onclick="enviar()">SUBMETER</button>

    <div class="card" style="margin-top:25px; background: var(--card-stats);">
        <div class="progress-label"><span>Mês (174h)</span><span id="txt-normal">0h</span></div>
        <div class="bar-bg"><div id="bar-normal" class="bar-fill fill-normal"></div></div>
        
        <div class="progress-label"><span>Acordo (15h)</span><span id="txt-acordo">0h</span></div>
        <div class="bar-bg"><div id="bar-acordo" class="bar-fill fill-acordo"></div></div>
        
        <div style="display:flex; justify-content:space-between; font-size:12px; font-weight:bold; margin-top:5px; color:#777;">
            <span>Dias Almoço:</span>
            <span id="contagem-almocos" style="color:#6ab09c;">0</span>
        </div>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwc1hOHtBYQbygRKN-1XWmlBJUAOyFuCc4sYtqb8b3aygSO3JRoUIebA19i_6mNwmxX/exec"; 
    let acumuladoMes = 0;
    let fotoBase64 = "";

    async function carregar() {
        document.getElementById('input-entrada').value = localStorage.getItem('p_ent') || "";
        document.getElementById('input-saida').value = localStorage.getItem('p_sai') || "";
        try {
            const res = await fetch(scriptURL);
            const data = await res.json();
            acumuladoMes = parseFloat(data.acumulado || 0);
            document.getElementById('contagem-almocos').innerText = data.almocos || 0;
            document.getElementById('sync-status').innerText = "CONECTADO";
            calc();
        } catch(e) { document.getElementById('sync-status').innerText = "OFFLINE"; calc(); }
    }

    function processarFoto(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                fotoBase64 = canvas.toDataURL('image/jpeg', 0.7);
                document.getElementById('preview-foto').src = fotoBase64;
                document.getElementById('preview-foto').style.display = "block";
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function manualSave(tipo) {
        localStorage.setItem('p_' + tipo, document.getElementById('input-' + tipo).value);
        calc();
    }

    function toggleAlmoco() {
        document.getElementById('area-almoco').style.display = document.getElementById('check-almoco').checked ? "block" : "none";
        calc();
    }

    function toCent(ts) {
        if(!ts) return 0;
        let [h, m] = ts.split(':').map(Number);
        return h + (m/60);
    }

    function calc() {
        let ent = toCent(document.getElementById('input-entrada').value);
        let sai = toCent(document.getElementById('input-saida').value);
        let desc = (document.getElementById('check-pausa').checked ? 0.5 : 0) + 
                   (document.getElementById('check-almoco').checked ? parseFloat(document.getElementById('select-almoco').value) : 0);
        let hoje = (sai > ent) ? (sai - ent - desc) : 0;
        let total = acumuladoMes + hoje;
        document.getElementById('bar-normal').style.width = Math.min(100, (total/174)*100) + "%";
        document.getElementById('txt-normal').innerText = Math.min(total, 174).toFixed(1) + "h";
        let acordo = total > 174 ? Math.min(15, total - 174) : 0;
        document.getElementById('bar-acordo').style.width = (acordo/15)*100 + "%";
        document.getElementById('txt-acordo').innerText = acordo.toFixed(1) + "h";
    }

    async function enviar() {
        const btn = document.getElementById('main-btn');
        btn.innerText = "..."; btn.disabled = true;
        let desc = (document.getElementById('check-pausa').checked ? 0.5 : 0) + 
                   (document.getElementById('check-almoco').checked ? parseFloat(document.getElementById('select-almoco').value) : 0);

        const payload = {
            data: new Date().toISOString().split('T')[0],
            entrada: toCent(document.getElementById('input-entrada').value),
            saida: toCent(document.getElementById('input-saida').value),
            almocoDuracao: desc,
            subAlmoco: document.getElementById('check-almoco').checked ? 16 : 0,
            foto: fotoBase64
        };

        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            localStorage.removeItem('p_ent'); localStorage.removeItem('p_sai');
            alert("Enviado com sucesso!"); location.reload();
        } catch (e) { alert("Erro ao enviar"); btn.disabled = false; btn.innerText = "SUBMETER"; }
    }
    window.onload = carregar;
</script>
</body>
</html>
