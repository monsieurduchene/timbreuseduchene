<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ponto Smart Dashboard</title>
    <style>
        :root {
            --bg: #efefef;
            --card-bg: #efefef;
            --shadow-dark: #d1d1d1;
            --shadow-light: #ffffff;
            --accent: #ff6b35;
            --text-main: #333;
            --text-sub: #777;
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 0; color: var(--text-main);
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 414px; padding: 25px; box-sizing: border-box; }

        /* Header */
        header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        header h1 { font-size: 26px; margin: 0; font-weight: 800; }
        header span { display: block; font-size: 14px; color: var(--text-sub); }

        /* Neumorphic Cards */
        .card {
            background: var(--card-bg);
            border-radius: 25px;
            padding: 20px;
            box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
            margin-bottom: 25px;
        }

        .status-badge { 
            background: var(--accent); color: white; padding: 4px 12px; 
            border-radius: 15px; font-size: 11px; font-weight: bold; display: inline-block;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .stat-box { 
            background: var(--card-bg); border-radius: 15px; padding: 15px; 
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
        }
        .stat-box label { font-size: 11px; color: var(--text-sub); display: block; margin-bottom: 5px; }
        .stat-box .value { font-size: 18px; font-weight: bold; }

        /* List Items */
        .log-item {
            background: var(--card-bg); border-radius: 20px; padding: 18px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            cursor: pointer; transition: transform 0.2s;
        }
        .log-item:active { transform: scale(0.98); box-shadow: inset 4px 4px 8px var(--shadow-dark); }
        .log-info { display: flex; align-items: center; gap: 15px; }
        .icon-circle { width: 45px; height: 45px; background: var(--card-bg); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light); }

        /* Form Details Area (Scroll) */
        .details-panel { margin-top: 20px; padding: 10px; border-radius: 20px; background: rgba(0,0,0,0.02); }
        h3 { font-size: 16px; color: var(--text-sub); margin-bottom: 15px; }
        label { font-size: 13px; font-weight: bold; display: block; margin: 10px 0 5px 5px; }
        input, select {
            width: 100%; border: none; padding: 15px; border-radius: 15px; 
            background: var(--card-bg); box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            font-size: 16px; margin-bottom: 15px; box-sizing: border-box;
        }

        .btn-submit {
            width: 100%; background: var(--text-main); color: #fff; border: none; padding: 20px;
            border-radius: 20px; font-size: 17px; font-weight: bold; margin-top: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); cursor: pointer;
        }
        .btn-submit:disabled { background: #999; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <span>Olá, bom trabalho</span>
            <h1>Dashboard<br>de Ponto</h1>
        </div>
        <div class="icon-circle">👤</div>
    </header>

    <div class="card">
        <span class="status-badge">Ativo</span>
        <div class="stats-grid">
            <div class="stat-box">
                <label>Extra Hoje (Cent.)</label>
                <div class="value" id="extra-hoje">0.00</div>
            </div>
            <div class="stat-box">
                <label>Saldo Estimado</label>
                <div class="value" id="saldo-total">...</div>
            </div>
        </div>
    </div>

    <div class="log-item" onclick="setNow('entrada')">
        <div class="log-info">
            <div class="icon-circle">🌅</div>
            <div><strong>Entrada</strong><br><small id="txt-entrada">Toque para marcar</small></div>
        </div>
        <span>🕒</span>
    </div>

    <div class="log-item" onclick="setNow('saida')">
        <div class="log-info">
            <div class="icon-circle">🌙</div>
            <div><strong>Saída</strong><br><small id="txt-saida">Toque para marcar</small></div>
        </div>
        <span>🕒</span>
    </div>

    <div class="details-panel">
        <h3>Configurações Adicionais</h3>
        
        <label>Data</label>
        <input type="date" id="data-input">
        
        <label>Intervalo de Almoço</label>
        <select id="select-almoco" onchange="updateCalculo()">
            <option value="1">1.0 hora</option>
            <option value="1.5">1.5 horas (1h30)</option>
        </select>

        <label>Foto do Cartão (Opcional)</label>
        <input type="file" id="foto-input" accept="image/*" capture="camera">
    </div>

    <button class="btn-submit" id="btn-envio" onclick="enviarParaGoogle()">Submeter Registo</button>
    <div style="height: 50px;"></div> </div>

<script>
    // Inicializar data de hoje
    document.getElementById('data-input').valueAsDate = new Date();
    
    let registo = {
        entrada: null,
        saida: null
    };

    function setNow(tipo) {
        const agora = new Date();
        const horaFormatada = agora.getHours().toString().padStart(2, '0') + ":" + agora.getMinutes().toString().padStart(2, '0');
        
        registo[tipo] = horaFormatada;
        document.getElementById('txt-' + tipo).innerText = horaFormatada;
        document.getElementById('txt-' + tipo).style.color = "#ff6b35";
        document.getElementById('txt-' + tipo).style.fontWeight = "bold";
        
        updateCalculo();
    }

    function toCentesimal(timeStr) {
        if(!timeStr) return 0;
        const [h, m] = timeStr.split(':').map(Number);
        return parseFloat((h + (m / 60)).toFixed(2));
    }

    function updateCalculo() {
        if(!registo.entrada || !registo.saida) return;

        const ent = toCentesimal(registo.entrada);
        const sai = toCentesimal(registo.saida);
        
        // Regra: Extra é o que foge do bloco 9.00-18.00 (Exemplo)
        // Podes ajustar esta lógica conforme a tua necessidade real
        let extra = Math.max(0, 9.0 - ent) + Math.max(0, sai - 18.0);
        
        document.getElementById('extra-hoje').innerText = extra.toFixed(2);
    }

    async function enviarParaGoogle() {
        // --- COLA O TEU URL ABAIXO ---
        const scriptURL = "https://script.google.com/macros/s/AKfycbyciFUj8H-zo1OXXrFLLwz_xwVJBfggtx8JYR9XIaaHp6xCNGtR7UAVoPCaD2E-vnup/exec"; 
        // ----------------------------

        if(!registo.entrada || !registo.saida) {
            alert("Por favor, marca a entrada e a saída primeiro!");
            return;
        }

        const btn = document.getElementById('btn-envio');
        btn.disabled = true;
        btn.innerText = "A enviar...";

        const payload = {
            data: document.getElementById('data-input').value,
            entrada: toCentesimal(registo.entrada),
            saida: toCentesimal(registo.saida),
            almocoDuracao: document.getElementById('select-almoco').value,
            totalExtraDia: document.getElementById('extra-hoje').innerText
        };

        try {
            // Usamos mode: 'no-cors' para garantir que o iPhone não bloqueie por segurança
            await fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            
            alert("Sucesso! O registo foi enviado para o Excel.");
        } catch (error) {
            alert("Erro ao enviar: " + error);
        } finally {
            btn.disabled = false;
            btn.innerText = "Submeter Registo";
        }
    }
</script>

</body>
</html>
