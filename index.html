<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pointage Müller</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Giga:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --bg: #ffffff; --header-bg: #212121; --header-text: #fafafa; 
            --card-ponto: #f5f5f5; --card-toggle: #e0e0e0; --card-stats: #eeeeee; 
            --btn-foto: #bdbdbd; --btn-submit: #9e9e9e; --text: #212121; 
            --text-secondary: #757575; --icon-active: #424242; --bar-bg: #e0e0e0;
            --color-pending: #d32f2f; --color-done: #388e3c; --gap-main: 20px; 
        }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; color: var(--text); -webkit-tap-highlight-color: transparent; }
        
        header { background: var(--header-bg); color: var(--header-text); padding: 50px 15px; margin-bottom: var(--gap-main); text-align: center; }
        .header-title { font-family: 'Lexend Giga', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: -1.5px; text-transform: uppercase; line-height: 1; }
        #sync-status { display: block; font-size: 9px; font-weight: bold; opacity: 0.5; margin-top: 12px; text-transform: uppercase; letter-spacing: 2px; }

        .main-container { max-width: 400px; margin: 0 auto; padding: 0 15px; box-sizing: border-box; padding-bottom: 60px; }
        
        .grid-2x2, .grid-small, .grid-action { display: grid; gap: 15px; margin-bottom: var(--gap-main); }
        .grid-2x2 { grid-template-columns: 1fr 1fr; }
        .grid-small { grid-template-columns: 1fr 1fr; }
        .grid-action { grid-template-columns: 1fr 4fr; align-items: stretch; }

        .btn-card { border-radius: 20px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .btn-card.time { background: var(--card-ponto); padding: 10px; box-sizing: border-box; }
        .btn-card.time i { color: var(--icon-active); opacity: 1; margin-bottom: 5px; }

        .time-input { border: none; background: transparent; font-size: 16px; font-weight: 800; color: var(--text); font-family: inherit; width: 100%; text-align: center; display: flex; justify-content: center; appearance: none; -webkit-appearance: none; }
        .time-input::-webkit-date-and-time-value { text-align: center; display: flex; justify-content: center; width: 100%; }

        .btn-card.toggle { background: var(--card-toggle); cursor: pointer; }
        .btn-card i { font-size: 24px; color: var(--text-secondary); opacity: 0.7; }
        .toggle.active i { color: var(--icon-active); opacity: 1; }
        .toggle.inactive { opacity: 0.4; filter: grayscale(1); }

        .btn-small { height: 35px; border-radius: 12px; background: var(--card-ponto); border: none; color: var(--text-secondary); font-weight: bold; font-size: 11px; text-transform: uppercase; }

        .btn-foto { width: 100%; background: var(--btn-foto); color: #fafafa; border: none; border-radius: 20px; font-size: 20px; }
        .btn-submit { width: 100%; background: var(--btn-submit); color: #fafafa; border: none; padding: 25px; border-radius: 20px; font-size: 22px; }
        
        #preview-foto { width: 100%; border-radius: 20px; display: none; margin-bottom: var(--gap-main); }

        .stats-container { background: var(--card-stats); border-radius: 20px; padding: 20px; margin-bottom: 30px; }
        .progress-label { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 5px; font-weight: 800; color: #9e9e9e; text-transform: uppercase; }
        .bar-bg { background: var(--bar-bg); height: 12px; border-radius: 6px; overflow: hidden; margin-bottom: 15px; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.5s ease; }

        /* ESTILOS DO HISTÓRICO */
        .history-section { border-top: 2px solid #eee; pt: 30px; margin-top: 10px; }
        .history-title { font-family: 'Lexend Giga', sans-serif; font-size: 14px; margin-bottom: 15px; display: block; }
        
        .select-mes { 
            width: 100%; padding: 15px; border-radius: 15px; border: none; 
            background: var(--card-ponto); font-weight: bold; color: var(--text);
            font-size: 14px; margin-bottom: 15px; appearance: none;
        }

        .history-list { display: flex; flex-direction: column; gap: 8px; }
        .history-item { 
            display: grid; grid-template-columns: 2fr 1fr 1fr; 
            background: var(--card-ponto); padding: 12px 15px; 
            border-radius: 12px; font-size: 12px; font-weight: bold;
        }
        .h-extra { color: var(--color-done); text-align: right; }
        .h-total { text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <span class="header-title">POINTAGE MÜLLER</span>
            <span id="sync-status">---</span>
        </div>
    </header>

    <div class="main-container">
        <div class="grid-2x2">
            <div class="btn-card time">
                <i class="fa-solid fa-right-to-bracket"></i>
                <input type="time" id="input-entrada" class="time-input" onchange="manualSave('ent')">
            </div>
            <div class="btn-card time">
                <i class="fa-solid fa-right-from-bracket"></i>
                <input type="time" id="input-saida" class="time-input" onchange="manualSave('sai')">
            </div>
        </div>

        <div class="grid-2x2">
            <div class="btn-card toggle active" id="card-pausa" onclick="toggleSimple('check-pausa', 'card-pausa')">
                <i class="fa-solid fa-circle-pause"></i>
                <input type="checkbox" id="check-pausa" style="display:none" checked onchange="calc()">
            </div>
            <div class="btn-card toggle meal-container inactive" id="card-almoco">
                <div style="height:70%; display:flex; align-items:center" onclick="toggleMeal()">
                    <i class="fa-solid fa-utensils"></i>
                    <input type="checkbox" id="check-almoco" style="display:none" onchange="calc()">
                </div>
                <div style="height:30%; display:flex; width:100%; border-top:1px solid #ddd">
                    <div class="meal-opt" id="opt-1" style="flex:1; text-align:center; font-size:10px; padding:5px" onclick="setMealTime(1)">1H</div>
                    <div class="meal-opt active" id="opt-15" style="flex:1; text-align:center; font-size:10px; padding:5px; background:var(--icon-active); color:white" onclick="setMealTime(1.5)">1H30</div>
                </div>
            </div>
        </div>

        <div class="grid-small">
            <button class="btn-small">congé</button>
            <button class="btn-small">vacances</button>
        </div>

        <div class="grid-action">
            <button class="btn-foto" onclick="document.getElementById('file-input').click()"><i class="fa-solid fa-image"></i></button>
            <button class="btn-submit" id="main-btn" onclick="enviar()"><i class="fa-solid fa-cloud-arrow-up"></i></button>
            <input type="file" id="file-input" accept="image/*" style="display:none;" onchange="processarFoto(this)">
        </div>
        <img id="preview-foto">

        <div class="stats-container">
            <div class="progress-label"><span>BASE (174h)</span><span id="txt-base">0h00m</span></div>
            <div class="bar-bg"><div id="bar-base" class="bar-fill"></div></div>
            <div class="progress-label"><span>EXTRA (+15h)</span><span id="txt-15">0h00m</span></div>
            <div class="bar-bg"><div id="bar-15" class="bar-fill"></div></div>
        </div>

        <div class="history-section">
            <span class="history-title">HISTÓRICO</span>
            <select class="select-mes" id="select-mes" onchange="consultarMes()">
                <option value="">Escolher mês...</option>
                <option value="01">Janeiro</option>
                <option value="02">Fevereiro</option>
                <option value="03">Março</option>
                <option value="04">Abril</option>
                <option value="05">Maio</option>
                <option value="06">Junho</option>
                <option value="07">Julho</option>
                <option value="08">Agosto</option>
                <option value="09">Setembro</option>
                <option value="10">Outubro</option>
                <option value="11">Novembro</option>
                <option value="12">Dezembro</option>
            </select>
            <div class="history-list" id="lista-historico">
                </div>
        </div>
    </div>

<script>
    const scriptURL = "COLA_AQUI_O_TEU_URL";
    let acumuladoMes = 0; let mealDuration = 1.5;

    async function carregar() {
        document.getElementById('input-entrada').value = localStorage.getItem('p_ent') || "";
        document.getElementById('input-saida').value = localStorage.getItem('p_sai') || "";
        try {
            const res = await fetch(scriptURL);
            const data = await res.json();
            acumuladoMes = parseFloat(data.acumulado || 0);
            document.getElementById('sync-status').innerText = "SINCRO OK";
            calc();
        } catch(e) { document.getElementById('sync-status').innerText = "OFFLINE"; calc(); }
    }

    // NOVA FUNÇÃO DE CONSULTA
    async function consultarMes() {
        const mes = document.getElementById('select-mes').value;
        const lista = document.getElementById('lista-historico');
        if(!mes) return;

        lista.innerHTML = '<div style="text-align:center; opacity:0.5">A carregar...</div>';
        
        try {
            // Assume-se que o teu script aceita o parâmetro ?mes=03
            const res = await fetch(`${scriptURL}?action=getHistory&mes=${mes}`);
            const logs = await res.json();
            
            lista.innerHTML = logs.map(log => `
                <div class="history-item">
                    <span>${log.data}</span>
                    <span class="h-total">${log.total}h</span>
                    <span class="h-extra">${log.extra > 0 ? '+'+log.extra+'h' : '-'}</span>
                </div>
            `).join('');
        } catch(e) {
            lista.innerHTML = '<div style="text-align:center; color:red">Erro ao carregar dados.</div>';
        }
    }

    // ... (restantes funções calc, toggle, enviar permanecem iguais)
    function toggleSimple(id, card) { /* ... */ }
    function calc() { /* ... */ }
    window.onload = carregar;
</script>
</body>
</html>
