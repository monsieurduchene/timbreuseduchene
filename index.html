<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwRf46PK11qZwjVSuqML0siZRQ0pq9WQwj_JHzyPzJOUD7OhYsHkZlQQF_T6Lyi593w/exec"; // SUBSTITUI PELO TEU URL /exec
    let acumuladoNoMes = 0; 
    let tempos = { entrada: null, saida: null };

    // FUNÇÃO DE LEITURA AUTOMÁTICA
    async function carregarDadosReais() {
        const statusHeader = document.querySelector('header span');
        statusHeader.innerText = "⏳ A sincronizar com Excel...";
        
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            acumuladoNoMes = parseFloat(data.acumulado);
            statusHeader.innerText = "✅ Sincronizado";
            calc(); // Atualiza as barras com os dados reais
        } catch (error) {
            statusHeader.innerText = "⚠️ Erro na leitura";
            console.error(error);
        }
    }

    function setNow(t) {
        let n = new Date();
        let s = n.getHours().toString().padStart(2,'0') + ":" + n.getMinutes().toString().padStart(2,'0');
        tempos[t] = s;
        document.getElementById('disp-' + t).innerText = s;
        calc();
    }

    function toCent(ts) {
        if(!ts) return 0;
        let [h, m] = ts.split(':').map(Number);
        return parseFloat((h + (m/60)).toFixed(2));
    }

    function calc() {
        let ent = toCent(tempos.entrada);
        let sai = toCent(tempos.saida);
        let alm = parseFloat(document.getElementById('select-almoco').value);
        
        let hoje = (sai > ent) ? (sai - ent - alm) : 0;
        let total = acumuladoNoMes + hoje;

        let normais = Math.min(total, 174);
        let acordo = (total > 174) ? Math.min(total - 174, 15) : 0;
        let extras = (total > 189) ? (total - 189) : 0;

        document.getElementById('txt-normal').innerText = normais.toFixed(2) + " / 174h";
        document.getElementById('bar-normal').style.width = (normais/174*100) + "%";
        document.getElementById('txt-acordo').innerText = acordo.toFixed(2) + " / 15h";
        document.getElementById('bar-acordo').style.width = (acordo/15*100) + "%";
        document.getElementById('txt-extra-real').innerText = extras.toFixed(2) + "h";
    }

    async function enviar() {
        if(!tempos.entrada || !tempos.saida) return alert("Marca os tempos!");
        const btn = document.querySelector('.btn-submit');
        btn.innerText = "A guardar...";

        const payload = {
            data: new Date().toISOString().split('T')[0],
            entrada: toCent(tempos.entrada),
            saida: toCent(tempos.saida),
            almocoDuracao: document.getElementById('select-almoco').value,
            subAlmoco: document.getElementById('check-subsidio').checked ? 16 : 0
        };

        await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
        alert("Enviado!");
        location.reload(); // Recarrega para ler os novos valores do Excel
    }

    // Iniciar leitura ao abrir a App
    window.onload = carregarDadosReais;
</script>
